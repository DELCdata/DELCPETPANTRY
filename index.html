}

// ── RECORD PICKUP ─────────────────────────────────────────────────────────────
function RecordPickup({clients,products,inventory,setInventory,distributions,setDistributions,params,navigate}){
  const [search,setSearch]=useState('');
  const [selectedClient,setSelectedClient]=useState(null);
  const [upcInput,setUpcInput]=useState('');
  const [items,setItems]=useState([]);
  const [pickupDate,setPickupDate]=useState(today());
  const [notes,setNotes]=useState('');
  const [confirm,setConfirm]=useState(false);
  const upcRef=useRef(null);

  const inv=useMemo(()=>{const m={};inventory.forEach(i=>m[i.productId]=i.qty);return m;},[inventory]);
  const prodMap=useMemo(()=>{const m={};products.forEach(p=>m[p.id]=p);return m;},[products]);

  useEffect(()=>{
    if(params?.clientId){
      const cl=clients.find(c=>c.id===params.clientId);
      if(cl) setSelectedClient(cl);
    }
  },[params]);

  const clientsFiltered=clients.filter(c=>{
    const q=search.toLowerCase();
    return !q||(c.firstName+' '+c.lastName+c.phone+c.email).toLowerCase().includes(q);
  });

  function addByUPC(){
    const code=upcInput.trim();
    if(!code) return;
    const prod=products.find(p=>p.upc===code);
    if(!prod){alert('Product not found in master. Please add it first.');return;}
    const existing=items.findIndex(i=>i.productId===prod.id);
    if(existing>=0){
      setItems(prev=>prev.map((it,i)=>i===existing?{...it,qty:it.qty+1}:it));
    } else {
      setItems(prev=>[...prev,{id:uid(),productId:prod.id,qty:1,notes:''}]);
    }
    setUpcInput('');upcRef.current?.focus();
  }

  function addByProduct(p){
    const existing=items.findIndex(i=>i.productId===p.id);
    if(existing>=0){setItems(prev=>prev.map((it,i)=>i===existing?{...it,qty:it.qty+1}:it));}
    else{setItems(prev=>[...prev,{id:uid(),productId:p.id,qty:1,notes:''}]);}
  }

  function finalizePickup(){
    if(!selectedClient){alert('Select a client first.');return;}
    if(items.length===0){alert('No items selected.');return;}
    // Check stock
    for(const item of items){
      if((inv[item.productId]||0)<item.qty){
        const p=prodMap[item.productId];
        alert(`Insufficient stock for ${p?.name}. Only ${inv[item.productId]||0} available.`);
        return;
      }
    }
    const dist={id:uid(),clientId:selectedClient.id,date:pickupDate,notes,items:items.map(i=>({productId:i.productId,qty:i.qty,notes:i.notes}))};
    const updates={};
    items.forEach(i=>{updates[i.productId]=(updates[i.productId]||0)+i.qty;});
    setInventory(prev=>prev.map(i=>updates[i.productId]!==undefined?{...i,qty:i.qty-updates[i.productId]}:i));
    setDistributions(prev=>[dist,...prev]);
    setItems([]);setNotes('');setConfirm(false);
    alert(`Pickup recorded for ${selectedClient.firstName} ${selectedClient.lastName}! ✅`);
    navigate('clients',{clientId:selectedClient.id});
  }

  if(!selectedClient){
    return(
      <div className="page">
        <div className="section-header mb-4"><div className="section-title">🛍 Record Pickup — Select Client</div></div>
        <div className="search-bar mb-4">
          <input className="form-control lg" placeholder="Search client by name, phone, or email…" value={search} onChange={e=>setSearch(e.target.value)} autoFocus/>
        </div>
        <div className="grid-3">
          {clientsFiltered.length===0&&<div className="card" style={{gridColumn:'1/-1'}}><div className="empty-state"><div className="icon">👥</div><h3>No clients found</h3></div></div>}
          {clientsFiltered.map(c=>(
            <div key={c.id} className="client-card" onClick={()=>setSelectedClient(c)}>
              <div style={{display:'flex',gap:12,alignItems:'center'}}>
                <div className="client-avatar">{c.firstName[0]}{c.lastName[0]}</div>
                <div>
                  <div className="font-bold">{c.firstName} {c.lastName}</div>
                  {c.phone&&<div className="text-sm text-muted">{c.phone}</div>}
                  <div className="text-xs text-muted">{(c.pets||[]).length} animal{(c.pets||[]).length!==1?'s':''}</div>
                </div>
              </div>
            </div>
          ))}
        </div>
        <div className="mt-4">
          <button className="btn btn-outline" onClick={()=>navigate('clients')}>+ Add New Client First</button>
        </div>
      </div>
    );
  }

  return(
    <div className="page">
      <div className="section-header mb-4">
        <div>
          <div className="section-title">🛍 Record Pickup</div>
          <div className="text-sm text-muted">{selectedClient.firstName} {selectedClient.lastName}</div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-outline" onClick={()=>{setSelectedClient(null);setItems([])}}>← Change Client</button>
          <button className="btn btn-success btn-lg" onClick={()=>setConfirm(true)} disabled={items.length===0}>✅ Complete Pickup</button>
        </div>
      </div>

      <div className="grid-2 mb-4">
        <div className="card">
          <div className="card-header"><span className="card-title">👤 {selectedClient.firstName} {selectedClient.lastName}</span></div>
          {selectedClient.phone&&<div className="text-sm mb-1">📞 {selectedClient.phone}</div>}
          {(selectedClient.pets||[]).map(pet=>(
            <div key={pet.id} className="text-sm mb-1">{pet.animalType==='Cat'?'🐱':pet.animalType==='Dog'?'🐶':'🐾'} <strong>{pet.name}</strong> — {pet.breed||pet.animalType}
              {pet.foodPref&&<span className="text-muted"> · Prefers: {pet.foodPref}</span>}
            </div>
          ))}
        </div>
        <div>
          <div className="form-group"><label className="form-label">Pickup Date</label>
            <input type="date" className="form-control" value={pickupDate} onChange={e=>setPickupDate(e.target.value)}/></div>
          <div className="form-group"><label className="form-label">Notes</label>
            <textarea className="form-control" value={notes} onChange={e=>setNotes(e.target.value)} rows={2}/></div>
        </div>
      </div>

      <div className="upc-bar mb-4">
        <span style={{color:'var(--gold)',fontWeight:700,fontSize:15}}>📡 Scan Item</span>
        <input ref={upcRef} className="upc-input" placeholder="Scan UPC to add item…" value={upcInput}
          onChange={e=>setUpcInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addByUPC()} autoFocus/>
        <button className="btn btn-gold" onClick={addByUPC}>Add</button>
      </div>

      <div className="grid-2">
        <div className="card">
          <div className="card-header"><span className="card-title">Pickup Items ({items.length})</span></div>
          {items.length===0&&<div className="text-sm text-muted">No items added yet. Scan or click from inventory.</div>}
          {items.map(item=>{
            const p=prodMap[item.productId];
            const avail=inv[item.productId]||0;
            return(
              <div key={item.id} className="batch-line">
                <div style={{flex:1}}>
                  <div className="font-bold text-sm">{p?.name}</div>
                  <div className="text-xs text-muted">{p?.brand} · Available: {avail}</div>
                </div>
                <div className="qty-controls">
                  <button className="qty-btn" onClick={()=>setItems(prev=>prev.map(i=>i.id===item.id?{...i,qty:Math.max(1,i.qty-1)}:i))}>−</button>
                  <input className="qty-num form-control" type="number" min={1} max={avail} value={item.qty}
                    onChange={e=>setItems(prev=>prev.map(i=>i.id===item.id?{...i,qty:Math.min(avail,parseInt(e.target.value)||1)}:i))}/>
                  <button className="qty-btn" onClick={()=>setItems(prev=>prev.map(i=>i.id===item.id?{...i,qty:Math.min(avail,i.qty+1)}:i))}>+</button>
                </div>
                <button className="btn btn-sm btn-danger" onClick={()=>setItems(prev=>prev.filter(i=>i.id!==item.id))}>✕</button>
              </div>
            );
          })}
        </div>
        <div className="card">
          <div className="card-header"><span className="card-title">Available Inventory</span></div>
          <input className="form-control mb-3" placeholder="Filter products…"
            value={search} onChange={e=>setSearch(e.target.value)}/>
          <div style={{maxHeight:320,overflowY:'auto'}}>
            {products.filter(p=>{
              const q=search.toLowerCase();
              return (!q||(p.name+p.brand).toLowerCase().includes(q))&&(inv[p.id]||0)>0;
            }).map(p=>(
              <div key={p.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:'1px solid var(--gray-100)',cursor:'pointer'}}
                onClick={()=>addByProduct(p)}>
                <div>
                  <div className="text-sm font-bold">{p.name}</div>
                  <div className="text-xs text-muted">{p.animalType} · {p.category}</div>
                </div>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  <span className="text-sm text-muted">{inv[p.id]} avail.</span>
                  <button className="btn btn-sm btn-outline">+ Add</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      <ConfirmModal show={confirm}
        message={`Complete pickup for ${selectedClient.firstName} ${selectedClient.lastName}? ${items.length} item types, ${items.reduce((s,i)=>s+i.qty,0)} total units. Inventory will be updated immediately.`}
        onConfirm={finalizePickup} onCancel={()=>setConfirm(false)}/>
    </div>
  );
}

// ── REPORTS ───────────────────────────────────────────────────────────────────
function Reports({products,inventory,batches,distributions,clients}){
  const [report,setReport]=useState('impact');
  const [dateFrom,setDateFrom]=useState('');
  const [dateTo,setDateTo]=useState('');
  const [filterType,setFilterType]=useState('All');
  const [filterClient,setFilterClient]=useState('');

  const inv=useMemo(()=>{const m={};inventory.forEach(i=>m[i.productId]=i.qty);return m;},[inventory]);
  const prodMap=useMemo(()=>{const m={};products.forEach(p=>m[p.id]=p);return m;},[products]);
  const clientMap=useMemo(()=>{const m={};clients.forEach(c=>m[c.id]=c);return m;},[clients]);

  function inRange(dateStr){
    if(dateFrom&&dateStr<dateFrom) return false;
    if(dateTo&&dateStr>dateTo) return false;
    return true;
  }

  const REPORTS=[
    {id:'impact',label:'🐾 Community Impact'},
    {id:'by-client',label:'👤 By Client'},
    {id:'distributions',label:'🛍 Distribution History'},
    {id:'donations',label:'📥 Donations Received'},
    {id:'inventory',label:'📦 Inventory'},
    {id:'low',label:'⚠️ Low Stock'},
    {id:'out',label:'🚫 Out of Stock'},
    {id:'cat',label:'🐱 Cat Supplies'},
    {id:'dog',label:'🐶 Dog Supplies'},
    {id:'other',label:'🐾 Other Animals'},
  ];

  // ── COMMUNITY IMPACT REPORT ──────────────────────────────────────────────
  function ImpactReport(){
    const filteredDists=distributions.filter(d=>inRange(d.date));

    // Households served
    const householdsServed=new Set(filteredDists.map(d=>d.clientId)).size;
    const totalVisits=filteredDists.length;

    // Animal counts across ALL clients who had at least one pickup in range
    const activeClientIds=new Set(filteredDists.map(d=>d.clientId));
    const activePets=clients.filter(c=>activeClientIds.has(c.id)).flatMap(c=>c.pets||[]);
    const catCount=activePets.filter(p=>p.animalType==='Cat').length;
    const dogCount=activePets.filter(p=>p.animalType==='Dog').length;
    const otherCount=activePets.filter(p=>p.animalType==='Other').length;
    const totalPets=activePets.length;

    // Total units distributed by animal type
    const unitsByType={Cat:0,Dog:0,Other:0};
    const unitsByCategory={};
    filteredDists.forEach(d=>{
      d.items.forEach(item=>{
        const p=prodMap[item.productId];
        if(p){
          unitsByType[p.animalType]=(unitsByType[p.animalType]||0)+item.qty;
          const key=`${p.animalType} — ${p.category}`;
          unitsByCategory[key]=(unitsByCategory[key]||0)+item.qty;
        }
      });
    });
    const totalUnits=Object.values(unitsByType).reduce((s,v)=>s+v,0);

    // Units received (donations)
    const filteredBatches=batches.filter(b=>b.status==='finalized'&&inRange(b.date));
    const totalReceived=filteredBatches.reduce((s,b)=>s+b.items.reduce((ss,i)=>ss+i.qty,0),0);

    // Per-visit breakdown
    const clientVisits={};
    filteredDists.forEach(d=>{
      if(!clientVisits[d.clientId]) clientVisits[d.clientId]={visits:0,units:0};
      clientVisits[d.clientId].visits++;
      clientVisits[d.clientId].units+=d.items.reduce((s,i)=>s+i.qty,0);
    });

    const statBox=(val,label,sub,color)=>(
      <div style={{background:'var(--white)',borderRadius:'var(--radius-lg)',padding:'20px',boxShadow:'var(--shadow)',borderTop:`4px solid ${color}`,textAlign:'center'}}>
        <div style={{fontSize:32,fontWeight:900,color}}>{val}</div>
        <div style={{fontWeight:700,fontSize:14,color:'var(--navy)',marginTop:4}}>{label}</div>
        {sub&&<div style={{fontSize:12,color:'var(--gray-400)',marginTop:2}}>{sub}</div>}
      </div>
    );

    return(
      <div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:14,marginBottom:24}}>
          {statBox(householdsServed,'Households Served','unique families','var(--navy)')}
          {statBox(totalVisits,'Total Visits','pickup sessions','var(--blue)')}
          {statBox(totalPets,'Pets Helped','across all families','var(--gold)')}
          {statBox(totalUnits,'Units Distributed','items given out','var(--green)')}
          {statBox(totalReceived,'Units Received','donated items','var(--orange)')}
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:20}}>
          {/* Animals helped breakdown */}
          <div className="card">
            <div className="card-header"><span className="card-title">🐾 Animals Helped</span></div>
            {catCount>0&&(
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:'1px solid var(--gray-100)'}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontSize:24}}>🐱</span>
                  <div><div className="font-bold">Cats</div><div className="text-xs text-muted">{catCount===1?'1 cat':'${catCount} cats'} across {new Set(clients.filter(c=>activeClientIds.has(c.id)&&(c.pets||[]).some(p=>p.animalType==='Cat')).map(c=>c.id)).size} household{new Set(clients.filter(c=>activeClientIds.has(c.id)&&(c.pets||[]).some(p=>p.animalType==='Cat')).map(c=>c.id)).size!==1?'s':''}</div></div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:24,fontWeight:900,color:'#7d3c98'}}>{catCount}</div>
                  <div style={{fontSize:11,color:'var(--gray-400)'}}>{unitsByType.Cat||0} units given</div>
                </div>
              </div>
            )}
            {dogCount>0&&(
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:'1px solid var(--gray-100)'}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontSize:24}}>🐶</span>
                  <div><div className="font-bold">Dogs</div><div className="text-xs text-muted">across {new Set(clients.filter(c=>activeClientIds.has(c.id)&&(c.pets||[]).some(p=>p.animalType==='Dog')).map(c=>c.id)).size} household{new Set(clients.filter(c=>activeClientIds.has(c.id)&&(c.pets||[]).some(p=>p.animalType==='Dog')).map(c=>c.id)).size!==1?'s':''}</div></div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:24,fontWeight:900,color:'#a04000'}}>{dogCount}</div>
                  <div style={{fontSize:11,color:'var(--gray-400)'}}>{unitsByType.Dog||0} units given</div>
                </div>
              </div>
            )}
            {otherCount>0&&(
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0'}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontSize:24}}>🐾</span>
                  <div><div className="font-bold">Other Animals</div><div className="text-xs text-muted">birds, small animals, etc.</div></div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:24,fontWeight:900,color:'#1a6b3a'}}>{otherCount}</div>
                  <div style={{fontSize:11,color:'var(--gray-400)'}}>{unitsByType.Other||0} units given</div>
                </div>
              </div>
            )}
            {totalPets===0&&<div className="text-sm text-muted">No pickups in selected date range.</div>}
          </div>

          {/* Units by category */}
          <div className="card">
            <div className="card-header"><span className="card-title">📦 Units Distributed by Category</span></div>
            {Object.entries(unitsByCategory).sort((a,b)=>b[1]-a[1]).map(([cat,qty])=>(
              <div key={cat} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:'1px solid var(--gray-100)'}}>
                <span className="text-sm">{cat}</span>
                <span className="font-bold text-sm">{qty}</span>
              </div>
            ))}
            {Object.keys(unitsByCategory).length===0&&<div className="text-sm text-muted">No distributions in range.</div>}
          </div>
        </div>

        {/* Narrative summary */}
        {totalVisits>0&&(
          <div className="alert alert-info" style={{fontSize:15,lineHeight:1.7}}>
            <strong>📋 Summary:</strong> During this period, the DELC Pet Pantry served <strong>{householdsServed} household{householdsServed!==1?'s':''}</strong> across <strong>{totalVisits} visit{totalVisits!==1?'s':''}</strong>, 
            providing support for <strong>{totalPets} pet{totalPets!==1?'s':''}</strong>
            {catCount>0?` including ${catCount} cat${catCount!==1?'s':''}`:''}{dogCount>0?`, ${dogCount} dog${dogCount!==1?'s':''}`:''}{otherCount>0?`, and ${otherCount} other animal${otherCount!==1?'s':''}`:''}.
            A total of <strong>{totalUnits} unit{totalUnits!==1?'s':''}</strong> of pet supplies were distributed.
          </div>
        )}
      </div>
    );
  }

  // ── BY CLIENT REPORT ─────────────────────────────────────────────────────
  function ByClientReport(){
    const filtered=clients.filter(c=>{
      if(filterClient&&!(c.firstName+' '+c.lastName).toLowerCase().includes(filterClient.toLowerCase())) return false;
      const hasDist=distributions.some(d=>d.clientId===c.id&&inRange(d.date));
      return hasDist||!filterClient;
    });

    return(
      <div>
        <input className="form-control mb-3" placeholder="Filter by client name…"
          value={filterClient} onChange={e=>setFilterClient(e.target.value)}/>
        <div className="table-wrap">
          <table>
            <thead><tr>
              <th>Client</th><th>Pets</th><th>Animal Types</th><th>Visits</th><th>Last Visit</th><th>Total Units</th><th>Top Item</th>
            </tr></thead>
            <tbody>
              {filtered.length===0&&<tr><td colSpan={7}><div className="empty-state" style={{padding:20}}><h3>No clients match</h3></div></td></tr>}
              {filtered.map(c=>{
                const cDists=distributions.filter(d=>d.clientId===c.id&&inRange(d.date));
                const visits=cDists.length;
                const totalUnits=cDists.reduce((s,d)=>s+d.items.reduce((ss,i)=>ss+i.qty,0),0);
                const lastVisit=cDists[0]?.date;
                const pets=c.pets||[];
                const animalTypes=[...new Set(pets.map(p=>p.animalType))];
                // Find top product
                const itemCounts={};
                cDists.forEach(d=>d.items.forEach(i=>{itemCounts[i.productId]=(itemCounts[i.productId]||0)+i.qty;}));
                const topPid=Object.entries(itemCounts).sort((a,b)=>b[1]-a[1])[0]?.[0];
                const topProd=topPid?prodMap[topPid]:null;
                return(
                  <tr key={c.id}>
                    <td><div className="font-bold">{c.firstName} {c.lastName}</div><div className="text-xs text-muted">{c.phone||c.email||''}</div></td>
                    <td>{pets.length}</td>
                    <td>
                      <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                        {animalTypes.map(t=><span key={t} className={`badge ${t==='Cat'?'badge-cat':t==='Dog'?'badge-dog':'badge-other'}`}>{t==='Cat'?'🐱':t==='Dog'?'🐶':'🐾'} {t}</span>)}
                        {animalTypes.length===0&&<span className="text-muted text-xs">None on file</span>}
                      </div>
                    </td>
                    <td className="font-bold">{visits}</td>
                    <td>{lastVisit?fmtDate(lastVisit):'—'}</td>
                    <td className="font-bold">{totalUnits}</td>
                    <td className="text-sm">{topProd?topProd.name:'—'}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    );
  }

  function renderReport(){
    switch(report){
      case 'impact': return <ImpactReport/>;
      case 'by-client': return <ByClientReport/>;
      case 'inventory':{
        const rows=products.filter(p=>filterType==='All'||p.animalType===filterType);
        return(<table><thead><tr><th>Product</th><th>Brand</th><th>Animal</th><th>Category</th><th>UPC</th><th>Qty</th><th>Status</th></tr></thead>
          <tbody>{rows.map(p=><tr key={p.id}><td>{p.name}</td><td>{p.brand||'—'}</td><td>{p.animalType}</td><td>{p.category}</td><td>{p.upc||'—'}</td><td className="font-bold">{inv[p.id]||0}</td><td>{stockBadge(inv[p.id]||0)}</td></tr>)}</tbody></table>);
      }
      case 'donations':{
        const rows=batches.filter(b=>b.status==='finalized'&&inRange(b.date));
        return(<table><thead><tr><th>Date</th><th>Donor</th><th>Products</th><th>Units</th><th>Notes</th></tr></thead>
          <tbody>{rows.map(b=><tr key={b.id}><td>{fmtDate(b.date)}</td><td>{b.donor||'Anonymous'}</td><td>{b.items.length}</td><td>{b.items.reduce((s,i)=>s+i.qty,0)}</td><td>{b.notes||'—'}</td></tr>)}</tbody></table>);
      }
      case 'distributions':{
        const rows=distributions.filter(d=>inRange(d.date)&&(filterClient===''||clients.find(c=>c.id===d.clientId&&(c.firstName+' '+c.lastName).toLowerCase().includes(filterClient.toLowerCase()))));
        return(<table><thead><tr><th>Date</th><th>Client</th><th>Animals</th><th>Items</th><th>Units</th><th>Notes</th></tr></thead>
          <tbody>{rows.map(d=>{
            const cl=clientMap[d.clientId];
            const pets=cl?.pets||[];
            return(<tr key={d.id}>
              <td>{fmtDate(d.date)}</td>
              <td className="font-bold">{cl?`${cl.firstName} ${cl.lastName}`:'Unknown'}</td>
              <td><div style={{display:'flex',gap:3,flexWrap:'wrap'}}>{[...new Set(pets.map(p=>p.animalType))].map(t=><span key={t} className={`badge ${t==='Cat'?'badge-cat':t==='Dog'?'badge-dog':'badge-other'}`} style={{fontSize:10}}>{t==='Cat'?'🐱':t==='Dog'?'🐶':'🐾'}</span>)}</div></td>
              <td>{d.items.length}</td>
              <td>{d.items.reduce((s,i)=>s+i.qty,0)}</td>
              <td className="text-sm text-muted">{d.notes||'—'}</td>
            </tr>);
          })}</tbody></table>);
      }
      case 'low':{
        const rows=products.filter(p=>{const q=inv[p.id]||0;return q>0&&q<=LOW_STOCK_THRESHOLD;});
        return(<table><thead><tr><th>Product</th><th>Animal</th><th>Category</th><th>Qty</th></tr></thead>
          <tbody>{rows.map(p=><tr key={p.id}><td>{p.name}</td><td>{animalBadge(p.animalType)}</td><td>{p.category}</td><td><span className="badge badge-low">{inv[p.id]}</span></td></tr>)}</tbody></table>);
      }
      case 'out':{
        const rows=products.filter(p=>(inv[p.id]||0)===0);
        return(<table><thead><tr><th>Product</th><th>Animal</th><th>Category</th><th>UPC</th></tr></thead>
          <tbody>{rows.map(p=><tr key={p.id}><td>{p.name}</td><td>{animalBadge(p.animalType)}</td><td>{p.category}</td><td>{p.upc||'—'}</td></tr>)}</tbody></table>);
      }
      case 'cat':case 'dog':case 'other':{
        const type=report==='cat'?'Cat':report==='dog'?'Dog':'Other';
        const rows=products.filter(p=>p.animalType===type);
        return(<table><thead><tr><th>Product</th><th>Brand</th><th>Category</th><th>Size</th><th>On Hand</th><th>Status</th></tr></thead>
          <tbody>{rows.map(p=><tr key={p.id}><td>{p.name}</td><td>{p.brand||'—'}</td><td>{p.category}</td><td>{p.size||'—'}</td><td className="font-bold">{inv[p.id]||0}</td><td>{stockBadge(inv[p.id]||0)}</td></tr>)}</tbody></table>);
      }
      default: return null;
    }
  }

  function exportReport(){
    let rows=[], cols=[];
    switch(report){
      case 'inventory':
        cols=[{key:'name',label:'Product'},{key:'brand',label:'Brand'},{key:'animalType',label:'Animal'},{key:'category',label:'Category'},{key:'upc',label:'UPC'},{key:'qty',label:'Qty'},{key:'status',label:'Status'}];
        rows=products.filter(p=>filterType==='All'||p.animalType===filterType).map(p=>({name:p.name,brand:p.brand||'',animalType:p.animalType,category:p.category,upc:p.upc||'',qty:inv[p.id]||0,status:(inv[p.id]||0)===0?'Out of Stock':(inv[p.id]||0)<=LOW_STOCK_THRESHOLD?'Low Stock':'In Stock'}));
        break;
      case 'donations':
        cols=[{key:'date',label:'Date'},{key:'donor',label:'Donor'},{key:'products',label:'Products'},{key:'units',label:'Units'},{key:'notes',label:'Notes'}];
        rows=batches.filter(b=>b.status==='finalized'&&inRange(b.date)).map(b=>({date:b.date,donor:b.donor||'Anonymous',products:b.items.length,units:b.items.reduce((s,i)=>s+i.qty,0),notes:b.notes||''}));
        break;
      case 'distributions':
        cols=[{key:'date',label:'Date'},{key:'client',label:'Client'},{key:'items',label:'Items'},{key:'units',label:'Units'},{key:'notes',label:'Notes'}];
        rows=distributions.filter(d=>inRange(d.date)).map(d=>{const cl=clientMap[d.clientId];return{date:d.date,client:cl?`${cl.firstName} ${cl.lastName}`:'Unknown',items:d.items.length,units:d.items.reduce((s,i)=>s+i.qty,0),notes:d.notes||''};});
        break;
      case 'by-client':
        cols=[{key:'name',label:'Client'},{key:'pets',label:'Pets'},{key:'types',label:'Animal Types'},{key:'visits',label:'Visits'},{key:'units',label:'Total Units'},{key:'lastVisit',label:'Last Visit'}];
        rows=clients.map(c=>{const cDists=distributions.filter(d=>d.clientId===c.id&&inRange(d.date));return{name:`${c.firstName} ${c.lastName}`,pets:(c.pets||[]).length,types:[...new Set((c.pets||[]).map(p=>p.animalType))].join(', '),visits:cDists.length,units:cDists.reduce((s,d)=>s+d.items.reduce((ss,i)=>ss+i.qty,0),0),lastVisit:cDists[0]?.date||''};}).filter(r=>r.visits>0||!filterClient);
        break;
      default: return;
    }
    if(rows.length) exportCSV(rows,cols,'DELC_PetPantry_'+report+'_'+today());
  }

  const showDateFilter=['donations','distributions','by-client','impact'].includes(report);
  const showTypeFilter=['inventory','cat','dog','other','low','out'].includes(report);
  const showClientFilter=['distributions','by-client'].includes(report);

  return(
    <div className="page">
      <div className="section-header mb-4">
        <div className="section-title">📊 Reports</div>
        <button className="btn btn-outline" onClick={exportReport}>📥 Export CSV</button>
      </div>
      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:16}}>
        {REPORTS.map(r=>(
          <button key={r.id} className={`btn ${report===r.id?'btn-primary':'btn-outline'}`}
            style={{fontSize:13}} onClick={()=>setReport(r.id)}>{r.label}</button>
        ))}
      </div>
      <div className="report-filter-bar">
        {showDateFilter&&<>
          <div className="form-group" style={{margin:0,flex:1}}>
            <label className="form-label">From Date</label>
            <input type="date" className="form-control" value={dateFrom} onChange={e=>setDateFrom(e.target.value)}/>
          </div>
          <div className="form-group" style={{margin:0,flex:1}}>
            <label className="form-label">To Date</label>
            <input type="date" className="form-control" value={dateTo} onChange={e=>setDateTo(e.target.value)}/>
          </div>
        </>}
        {showTypeFilter&&(
          <div className="form-group" style={{margin:0,flex:1}}>
            <label className="form-label">Animal Type</label>
            <select className="form-control" value={filterType} onChange={e=>setFilterType(e.target.value)}>
              <option>All</option>{ANIMAL_TYPES.map(t=><option key={t}>{t}</option>)}
            </select>
          </div>
        )}
        {showClientFilter&&(
          <div className="form-group" style={{margin:0,flex:2}}>
            <label className="form-label">Filter by Client</label>
            <input className="form-control" placeholder="Type client name…" value={filterClient} onChange={e=>setFilterClient(e.target.value)}/>
          </div>
        )}
        <button className="btn btn-outline" onClick={()=>{setDateFrom('');setDateTo('');setFilterType('All');setFilterClient('');}}>Clear</button>
      </div>
      <div className={report==='impact'||report==='by-client'?'':'table-wrap'}>{renderReport()}</div>
    </div>
  );
}

// ── SETTINGS ──────────────────────────────────────────────────────────────────
function Settings({loadAll}){
  const [confirm,setConfirm]=useState(null);
  const [busy,setBusy]=useState(false);

  async function clearAll(){
    setBusy(true);
    await sb.from('distribution_items').delete().neq('id','__none__');
    await sb.from('distributions').delete().neq('id','__none__');
    await sb.from('batch_items').delete().neq('id','__none__');
    await sb.from('batches').delete().neq('id','__none__');
    await sb.from('adjustments').delete().neq('id','__none__');
    await sb.from('pets').delete().neq('id','__none__');
    await sb.from('clients').delete().neq('id','__none__');
    await sb.from('inventory').delete().neq('id','__none__');
    await sb.from('products').delete().neq('id','__none__');
    await loadAll();
    setBusy(false);alert('All data cleared.');setConfirm(null);
  }

  async function forceSync(){
    setBusy(true);
    await loadAll();
    setBusy(false);alert('Data refreshed from database. ✅');
  }

  return(
    <div className="page">
      <div className="section-header mb-4"><div className="section-title">⚙️ Settings</div></div>
      <div className="card mb-4">
        <div className="card-header"><span className="card-title">About</span></div>
        <div className="text-sm mb-2"><strong>DELC Pet Pantry Management System</strong></div>
        <div className="text-sm text-muted mb-1">Duncansville Evangelical Lutheran Church</div>
        <div className="text-sm text-muted mb-1">Version 1.0 — Powered by Supabase</div>
        <div className="text-sm text-muted">Data is stored in the cloud and syncs across all devices automatically.</div>
      </div>
      <div className="card mb-4">
        <div className="card-header"><span className="card-title">Database</span></div>
        <div className="text-sm text-muted mb-3">Connected to: <strong>hmkyzdivvkxwlagnjfeu.supabase.co</strong></div>
        <button className="btn btn-outline" onClick={forceSync} disabled={busy}>{busy?'Refreshing…':'🔄 Refresh Data from Database'}</button>
      </div>
      <div className="card mb-4">
        <div className="card-header"><span className="card-title">Thresholds</span></div>
        <div className="text-sm text-muted">Low stock alert triggers when quantity is ≤ {LOW_STOCK_THRESHOLD} units.</div>
      </div>
      <div className="card">
        <div className="card-header"><span className="card-title">Data Management</span></div>
        <div style={{display:'flex',gap:10,marginTop:8}}>
          <button className="btn btn-danger" onClick={()=>setConfirm('clear')} disabled={busy}>Clear All Data from Database</button>
        </div>
      </div>
      <ConfirmModal show={confirm==='clear'} message="Clear ALL data from the database permanently? Every device will lose all data. This cannot be undone."
        onConfirm={clearAll} onCancel={()=>setConfirm(null)}/>
    </div>
  );
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
const PASSWORD='Delc.1200';

function LoginPage({onLogin}){
  const [username,setUsername]=useState('');
  const [password,setPassword]=useState('');
  const [error,setError]=useState('');
  const [showPw,setShowPw]=useState(false);

  function handleLogin(e){
    e.preventDefault();
    const u=username.trim().toLowerCase();
    if(!u){setError('Please enter your username.');return;}
    if(password!==PASSWORD){setError('Incorrect password. Please try again.');return;}
    // Username format: firstinitial + lastname, no spaces
    if(!/^[a-z][a-z]+$/.test(u)){setError('Username format: first initial + last name (e.g. ddetrich).');return;}
    onLogin(u);
  }

  return(
    <div className="login-page">
      <div className="login-card">
        <div className="login-logo">
          <div className="paw">🐾</div>
          <h1>DELC Pet Pantry</h1>
          <p>Duncansville Evangelical Lutheran Church</p>
        </div>
        {error&&<div className="login-error">⚠️ {error}</div>}
        <form onSubmit={handleLogin}>
          <div className="form-group">
            <label className="form-label">Username</label>
            <input className="form-control lg" value={username} onChange={e=>setUsername(e.target.value)}
              placeholder="e.g. ddetrich" autoComplete="username" autoFocus/>
          </div>
          <div className="form-group" style={{position:'relative'}}>
            <label className="form-label">Password</label>
            <input className="form-control lg" type={showPw?'text':'password'} value={password}
              onChange={e=>setPassword(e.target.value)} placeholder="Enter password" autoComplete="current-password"/>
            <button type="button" onClick={()=>setShowPw(s=>!s)}
              style={{position:'absolute',right:12,top:34,background:'none',border:'none',cursor:'pointer',color:'var(--gray-400)',fontSize:18}}>
              {showPw?'🙈':'👁'}
            </button>
          </div>
          <button type="submit" className="btn btn-primary btn-lg w-full" style={{marginTop:8}}>Sign In →</button>
        </form>
        <div className="login-hint">
          <strong>Username format:</strong> first initial + last name, no spaces<br/>
          <strong>Example:</strong> Derek Detrich → <code>ddetrich</code><br/>
          <strong>Example:</strong> Jane Smith → <code>jsmith</code>
        </div>
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const [currentUser,setCurrentUser]=useState(()=>LS.get('currentUser',null));
  const [page,setPage]=useState('dashboard');
  const [pageParams,setPageParams]=useState(null);
  const [products,setProductsState]=useState([]);
  const [inventory,setInventoryState]=useState([]);
  const [batches,setBatchesState]=useState([]);
  const [distributions,setDistributionsState]=useState([]);
  const [clients,setClientsState]=useState([]);
  const [loading,setLoading]=useState(true);
  const [dbError,setDbError]=useState(null);
  const [saving,setSaving]=useState(false);

  // ── LOAD ALL DATA FROM SUPABASE ──────────────────────────────────────────
  async function loadAll(){
    setLoading(true);setDbError(null);
    try{
      const [pRes,iRes,bRes,biRes,cRes,petRes,dRes,diRes,aRes]=await Promise.all([
        sb.from('products').select('*'),
        sb.from('inventory').select('*'),
        sb.from('batches').select('*').order('date',{ascending:false}),
        sb.from('batch_items').select('*'),
        sb.from('clients').select('*').order('last_name'),
        sb.from('pets').select('*'),
        sb.from('distributions').select('*').order('date',{ascending:false}),
        sb.from('distribution_items').select('*'),
        sb.from('adjustments').select('*').order('created_at',{ascending:false}),
      ]);
      if(pRes.error) throw pRes.error;
      const prods=(pRes.data||[]).map(rowToProduct);
      setProductsState(prods);
      setInventoryState((iRes.data||[]).map(rowToInventory));
      // Assemble batches with items
      const bItems=biRes.data||[];
      setBatchesState((bRes.data||[]).map(b=>rowToBatch(b,bItems.filter(i=>i.batch_id===b.id).map(rowToBatchItem))));
      // Assemble clients with pets
      const petsData=(petRes.data||[]).map(rowToPet);
      setClientsState((cRes.data||[]).map(c=>rowToClient(c,petsData.filter(p=>p.clientId===c.id))));
      // Assemble distributions with items
      const diItems=diRes.data||[];
      setDistributionsState((dRes.data||[]).map(d=>rowToDistribution(d,diItems.filter(i=>i.distribution_id===d.id).map(rowToDistItem))));
      LS.set('adjustments',(aRes.data||[]).map(rowToAdj));
    }catch(e){
      console.error(e);
      setDbError('Could not connect to database: '+e.message);
    }
    setLoading(false);
  }

  useEffect(()=>{if(currentUser) loadAll();},[currentUser]);
  useEffect(()=>LS.set('currentUser',currentUser),[currentUser]);

  // ── SUPABASE WRITE HELPERS ───────────────────────────────────────────────
  // Products
  async function setProducts(updater){
    const next=typeof updater==='function'?updater(products):updater;
    setProductsState(next);
    // Upsert changed products
    const rows=next.map(productToRow);
    await sb.from('products').upsert(rows);
  }

  // Inventory
  async function setInventory(updater){
    const next=typeof updater==='function'?updater(inventory):updater;
    setInventoryState(next);
    const rows=next.map(i=>({id:i.id,product_id:i.productId,qty:i.qty,updated_at:new Date().toISOString()}));
    await sb.from('inventory').upsert(rows);
  }

  // Batches — full replace approach: upsert batch + delete/insert items
  async function setBatches(updater){
    const next=typeof updater==='function'?updater(batches):updater;
    setBatchesState(next);
    // Find new/changed batches by comparing
    for(const b of next){
      await sb.from('batches').upsert({id:b.id,date:b.date,donor:b.donor,status:b.status,notes:b.notes});
      // Replace items for this batch
      await sb.from('batch_items').delete().eq('batch_id',b.id);
      if(b.items.length>0){
        await sb.from('batch_items').insert(b.items.map((item,idx)=>({id:b.id+'_'+idx,batch_id:b.id,product_id:item.productId,qty:item.qty,notes:item.notes||''})));
      }
    }
    // Delete removed batches
    const ids=next.map(b=>b.id);
    const prev=batches.map(b=>b.id);
    const removed=prev.filter(id=>!ids.includes(id));
    for(const id of removed) await sb.from('batches').delete().eq('id',id);
  }

  // Distributions
  async function setDistributions(updater){
    const next=typeof updater==='function'?updater(distributions):updater;
    setDistributionsState(next);
    for(const d of next){
      await sb.from('distributions').upsert({id:d.id,client_id:d.clientId,date:d.date,notes:d.notes});
      await sb.from('distribution_items').delete().eq('distribution_id',d.id);
      if(d.items.length>0){
        await sb.from('distribution_items').insert(d.items.map((item,idx)=>({id:d.id+'_'+idx,distribution_id:d.id,product_id:item.productId,qty:item.qty,notes:item.notes||''})));
      }
    }
    const ids=next.map(d=>d.id);
    const prev=distributions.map(d=>d.id);
    const removed=prev.filter(id=>!ids.includes(id));
    for(const id of removed) await sb.from('distributions').delete().eq('id',id);
  }

  // Clients
  async function setClients(updater){
    const next=typeof updater==='function'?updater(clients):updater;
    setClientsState(next);
    for(const c of next){
      await sb.from('clients').upsert({id:c.id,first_name:c.firstName,last_name:c.lastName,phone:c.phone||'',email:c.email||'',address:c.address||'',notes:c.notes||''});
      // Replace pets
      await sb.from('pets').delete().eq('client_id',c.id);
      if((c.pets||[]).length>0){
        await sb.from('pets').insert(c.pets.map(p=>({id:p.id,client_id:c.id,name:p.name,animal_type:p.animalType,breed:p.breed||'',age:p.age||'',special_notes:p.specialNotes||'',food_pref:p.foodPref||''})));
      }
    }
    const ids=next.map(c=>c.id);
    const prev=clients.map(c=>c.id);
    const removed=prev.filter(id=>!ids.includes(id));
    for(const id of removed) await sb.from('clients').delete().eq('id',id);
  }

  const pendingCount=batches.filter(b=>b.status==='pending').length;
  const inv=useMemo(()=>{const m={};inventory.forEach(i=>m[i.productId]=i.qty);return m;},[inventory]);
  const outCount=products.filter(p=>(inv[p.id]||0)===0).length;

  function handleLogin(username){setCurrentUser(username);}
  function handleLogout(){setCurrentUser(null);setPage('dashboard');}
  function navigate(pg,params){setPage(pg);setPageParams(params||null);}

  if(!currentUser) return <LoginPage onLogin={handleLogin}/>;

  if(loading) return(
    <div style={{minHeight:'100vh',background:'var(--navy-dark)',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16}}>
      <div style={{fontSize:52}}>🐾</div>
      <div style={{color:'var(--gold)',fontSize:20,fontWeight:700}}>Loading Pet Pantry…</div>
      <div style={{color:'rgba(255,255,255,.5)',fontSize:14}}>Connecting to database</div>
    </div>
  );

  if(dbError) return(
    <div style={{minHeight:'100vh',background:'var(--navy-dark)',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16,padding:24}}>
      <div style={{fontSize:48}}>⚠️</div>
      <div style={{color:'var(--gold)',fontSize:18,fontWeight:700}}>Database Connection Error</div>
      <div style={{color:'rgba(255,255,255,.7)',fontSize:14,textAlign:'center',maxWidth:400}}>{dbError}</div>
      <button className="btn btn-gold" onClick={loadAll}>Retry</button>
    </div>
  );

  const NAV=[
    {id:'dashboard',icon:'🏠',label:'Dashboard'},
    {section:'Donations'},
    {id:'receive',icon:'📥',label:'Receive Donations'},
    {id:'batch-review',icon:'📋',label:'Batch Review',badge:pendingCount},
    {section:'Inventory'},
    {id:'inventory',icon:'📦',label:'Inventory',badge:outCount?`${outCount} out`:null},
    {id:'stock-count',icon:'🔢',label:'Stock Count'},
    {id:'products',icon:'🏷',label:'Product Master'},
    {id:'adjustments',icon:'📊',label:'Adjustments'},
    {section:'Clients'},
    {id:'clients',icon:'👥',label:'Clients'},
    {id:'pickup',icon:'🛍',label:'Record Pickup'},
    {section:'System'},
    {id:'reports',icon:'📈',label:'Reports'},
    {id:'settings',icon:'⚙️',label:'Settings'},
  ];

  const PAGE_TITLES={dashboard:'Dashboard',receive:'Receive Donations','batch-review':'Batch Review',inventory:'Inventory','stock-count':'Stock Count',products:'Product Master',adjustments:'Adjustments Log',clients:'Clients',pickup:'Record Pickup',reports:'Reports',settings:'Settings'};

  function renderPage(){
    const props={products,setProducts,inventory,setInventory,batches,setBatches,distributions,setDistributions,clients,setClients,navigate,params:pageParams};
    switch(page){
      case 'dashboard': return <Dashboard {...props}/>;
      case 'receive': return <ReceiveDonations {...props}/>;
      case 'batch-review': return <BatchReview {...props}/>;
      case 'inventory': return <Inventory {...props}/>;
      case 'products': return <ProductMaster {...props}/>;
      case 'stock-count': return <StockCount products={products} inventory={inventory} setInventory={setInventory}/>;
      case 'adjustments': return <AdjustmentsLog products={products}/>;
      case 'clients': return <Clients {...props}/>;
      case 'pickup': return <RecordPickup {...props}/>;
      case 'reports': return <Reports products={products} inventory={inventory} batches={batches} distributions={distributions} clients={clients}/>;
      case 'settings': return <Settings loadAll={loadAll}/>;
      default: return <Dashboard {...props}/>;
    }
  }

  return(
    <>
      <nav className="sidebar">
        <div className="sidebar-logo">
          <div style={{fontSize:36}}>🐾</div>
          <div className="sidebar-logo-text">DELC Pet Pantry</div>
          <div className="sidebar-logo-sub">Duncansville ELC</div>
        </div>
        {NAV.map((item,i)=>{
          if(item.section) return <div key={i} className="sidebar-section"><div className="sidebar-section-label">{item.section}</div></div>;
          return(
            <button key={item.id} className={`nav-item ${page===item.id?'active':''}`} onClick={()=>navigate(item.id)}>
              <span className="icon">{item.icon}</span>
              <span>{item.label}</span>
              {item.badge?<span style={{marginLeft:'auto',background:'var(--red)',color:'white',borderRadius:10,fontSize:10,padding:'2px 6px',fontWeight:700}}>{item.badge}</span>:null}
            </button>
          );
        })}
      </nav>
      <div className="main">
        <div className="topbar">
          <span className="topbar-title">{PAGE_TITLES[page]||page}</span>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            {outCount>0&&<span className="badge badge-out">🚫 {outCount} Out of Stock</span>}
            {pendingCount>0&&<span className="badge badge-pending">⏳ {pendingCount} Pending</span>}
            <div style={{display:'flex',alignItems:'center',gap:8,marginLeft:8,paddingLeft:12,borderLeft:'1px solid var(--gray-200)'}}>
              <span style={{fontSize:13,color:'var(--gray-600)'}}>👤 <strong>{currentUser}</strong></span>
              <button className="btn btn-sm btn-outline" onClick={handleLogout}>Sign Out</button>
            </div>
          </div>
        </div>
        {renderPage()}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
