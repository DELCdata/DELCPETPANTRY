  const upcRef=useRef(null);

  const inv=useMemo(()=>{const m={};inventory.forEach(i=>m[i.productId]=i.qty);return m;},[inventory]);
  const prodMap=useMemo(()=>{const m={};products.forEach(p=>m[p.id]=p);return m;},[products]);

  async function handleScan(){
    const code=upcInput.trim();
    if(!code) return;
    // Already in batch?
    const inBatch=batchItems.findIndex(bi=>bi.upc===code);
    if(inBatch>=0){setBatchItems(prev=>prev.map((bi,i)=>i===inBatch?{...bi,qty:bi.qty+1}:bi));setUpcInput('');upcRef.current?.focus();return;}
    // In product master?
    const prod=products.find(p=>p.upc===code);
    if(prod){
      setBatchItems(prev=>[...prev,{id:uid(),upc:code,productId:prod.id,name:prod.name,brand:prod.brand,animalType:prod.animalType,category:prod.category,size:prod.size,image:prod.image,qty:1,notes:''}]);
      setUpcInput('');upcRef.current?.focus();return;
    }
    // External lookup
    setLooking(true);
    const result=await lookupUPC(code);
    setLooking(false);
    if(result.found){
      setPendingPrefill({upc:code,name:result.name,brand:result.brand,size:result.size,image:result.image,animalType:'Cat',category:'Dry Food',notes:'',_source:result.source});
    } else {
      setPendingPrefill({upc:code,name:'',brand:'',size:'',image:'',animalType:'Cat',category:'Dry Food',notes:'',_source:null});
    }
    setShowProductModal(true);
    setUpcInput('');
  }

  function saveNewProduct(form){
    const np={...form,id:uid()};
    setProducts(prev=>[...prev,np]);
    setInventory(prev=>[...prev,{id:uid(),productId:np.id,qty:0}]);
    setBatchItems(prev=>[...prev,{id:uid(),upc:np.upc,productId:np.id,name:np.name,brand:np.brand,animalType:np.animalType,category:np.category,size:np.size,image:np.image,qty:1,notes:''}]);
    setShowProductModal(false);setPendingPrefill(null);
    upcRef.current?.focus();
  }

  function updateItem(id,field,val){setBatchItems(prev=>prev.map(bi=>bi.id===id?{...bi,[field]:val}:bi));}
  function removeItem(id){setBatchItems(prev=>prev.filter(bi=>bi.id!==id));}

  function finalizeBatch(){
    if(batchItems.length===0){alert('No items in batch.');return;}
    const newBatch={
      id:uid(),date:batchDate,donor:donor||'Anonymous',status:'finalized',notes:batchNotes,
      items:batchItems.map(bi=>({productId:bi.productId,qty:bi.qty,notes:bi.notes}))
    };
    // Update inventory
    const updates={};
    batchItems.forEach(bi=>{updates[bi.productId]=(updates[bi.productId]||0)+bi.qty;});
    setInventory(prev=>prev.map(i=>updates[i.productId]!==undefined?{...i,qty:i.qty+updates[i.productId]}:i));
    setBatches(prev=>[newBatch,...prev]);
    setBatchItems([]);setDonor('');setBatchNotes('');setBatchDate(today());
    setConfirm(false);
    alert('Receiving batch finalized! Inventory updated. ✅');
    navigate('batch-review');
  }

  function savePending(){
    if(batchItems.length===0){alert('No items to save.');return;}
    const newBatch={
      id:uid(),date:batchDate,donor:donor||'Anonymous',status:'pending',notes:batchNotes,
      items:batchItems.map(bi=>({productId:bi.productId,qty:bi.qty,notes:bi.notes}))
    };
    setBatches(prev=>[newBatch,...prev]);
    setBatchItems([]);setDonor('');setBatchNotes('');setBatchDate(today());
    alert('Batch saved as pending.');navigate('batch-review');
  }

  return(
    <div className="page">
      <div className="section-header mb-4">
        <div className="section-title">📥 Receive Donations</div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-outline" onClick={savePending} disabled={batchItems.length===0}>Save as Pending</button>
          <button className="btn btn-success btn-lg" onClick={()=>setConfirm(true)} disabled={batchItems.length===0}>✅ Finalize Batch</button>
        </div>
      </div>

      <div className="grid-2 mb-4">
        <div className="form-group"><label className="form-label">Donor / Source</label>
          <input className="form-control lg" value={donor} onChange={e=>setDonor(e.target.value)} placeholder="e.g. First UMC, Anonymous, John Smith"/></div>
        <div className="form-group"><label className="form-label">Date</label>
          <input type="date" className="form-control lg" value={batchDate} onChange={e=>setBatchDate(e.target.value)}/></div>
      </div>
      <div className="form-group mb-4">
        <label className="form-label">Batch Notes</label>
        <input className="form-control" value={batchNotes} onChange={e=>setBatchNotes(e.target.value)} placeholder="Optional notes about this donation"/>
      </div>

      <div className="upc-bar mb-4">
        <span style={{color:'var(--gold)',fontWeight:700,fontSize:15}}>📡 Scan Item</span>
        <input ref={upcRef} className="upc-input" placeholder="Scan or type UPC barcode, then Enter…" value={upcInput}
          onChange={e=>setUpcInput(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&handleScan()}
          autoFocus/>
        <button className="btn btn-gold" onClick={handleScan} disabled={looking}>{looking?'Looking…':'Add'}</button>
      </div>

      {batchItems.length===0?(
        <div className="card"><div className="empty-state"><div className="icon">📦</div><h3>No items in batch</h3><p>Scan a UPC or add items above to begin.</p></div></div>
      ):(
        <div className="card">
          <div className="card-header">
            <span className="card-title">Batch Items ({batchItems.length} products, {batchItems.reduce((s,i)=>s+i.qty,0)} units)</span>
          </div>
          {batchItems.map(bi=>(
            <div key={bi.id} className="batch-line">
              <div style={{flex:1}}>
                <div className="font-bold text-sm">{bi.name}</div>
                <div className="text-xs text-muted">{bi.brand} · {bi.size} · {bi.upc}</div>
                <div style={{display:'flex',gap:8,marginTop:6}}>
                  {animalBadge(bi.animalType)}
                  <span className="badge badge-pending">{bi.category}</span>
                </div>
              </div>
              <div className="qty-controls">
                <button className="qty-btn" onClick={()=>updateItem(bi.id,'qty',Math.max(0,bi.qty-1))}>−</button>
                <input className="qty-num form-control" type="number" value={bi.qty} min={0}
                  onChange={e=>updateItem(bi.id,'qty',parseInt(e.target.value)||0)}/>
                <button className="qty-btn" onClick={()=>updateItem(bi.id,'qty',bi.qty+1)}>+</button>
              </div>
              <input className="form-control text-sm" style={{width:180}} placeholder="Notes…" value={bi.notes} onChange={e=>updateItem(bi.id,'notes',e.target.value)}/>
              <button className="btn btn-sm btn-danger" onClick={()=>removeItem(bi.id)}>✕</button>
            </div>
          ))}
        </div>
      )}

      <Modal show={showProductModal} onClose={()=>{setShowProductModal(false);setPendingPrefill(null);setTimeout(()=>upcRef.current?.focus(),50);}}
        title={pendingPrefill?._source?`Product Found — ${pendingPrefill._source}`:'New Product — Enter Details'} wide>
        <div className={`alert ${pendingPrefill?._source?'alert-success':'alert-info'} mb-3`}>
          {pendingPrefill?._source
            ? `✅ Product info found via ${pendingPrefill._source}. Please confirm the details below, set the animal type and category, then save.`
            : 'UPC not found in any database. Please fill in the product details manually and click Save.'}
        </div>
        <ProductForm product={pendingPrefill} onSave={saveNewProduct} onCancel={()=>{setShowProductModal(false);setPendingPrefill(null);setTimeout(()=>upcRef.current?.focus(),50);}}/>
      </Modal>
      <ConfirmModal show={confirm} message={`Finalize this batch of ${batchItems.length} products (${batchItems.reduce((s,i)=>s+i.qty,0)} units)? This will update inventory immediately.`}
        onConfirm={finalizeBatch} onCancel={()=>setConfirm(false)}/>
    </div>
  );
}

// ── BATCH REVIEW ──────────────────────────────────────────────────────────────
function BatchReview({batches,setBatches,products,inventory,setInventory,navigate}){
  const [detail,setDetail]=useState(null);
  const [confirm,setConfirm]=useState(null);
  const prodMap=useMemo(()=>{const m={};products.forEach(p=>m[p.id]=p);return m;},[products]);

  const sorted=[...batches].sort((a,b)=>b.date.localeCompare(a.date));

  function finalize(batch){
    const updates={};
    batch.items.forEach(i=>{updates[i.productId]=(updates[i.productId]||0)+i.qty;});
    setInventory(prev=>prev.map(i=>updates[i.productId]!==undefined?{...i,qty:i.qty+updates[i.productId]}:i));
    setBatches(prev=>prev.map(b=>b.id===batch.id?{...b,status:'finalized'}:b));
    setDetail(null);alert('Batch finalized! Inventory updated. ✅');
  }

  function deleteBatch(id){
    setConfirm({msg:'Delete this batch? This cannot be undone.',cb:()=>{setBatches(prev=>prev.filter(b=>b.id!==id));setDetail(null);setConfirm(null);}});
  }

  return(
    <div className="page">
      <div className="section-header mb-4">
        <div className="section-title">📋 Receiving Batch Review</div>
        <button className="btn btn-gold" onClick={()=>navigate('receive')}>+ New Batch</button>
      </div>

      <div className="table-wrap">
        <table>
          <thead><tr><th>Date</th><th>Donor</th><th>Items</th><th>Units</th><th>Status</th><th>Notes</th><th>Actions</th></tr></thead>
          <tbody>
            {sorted.length===0&&<tr><td colSpan={7}><div className="empty-state"><div className="icon">📥</div><h3>No batches yet</h3></div></td></tr>}
            {sorted.map(b=>{
              const totalUnits=b.items.reduce((s,i)=>s+i.qty,0);
              return(
                <tr key={b.id}>
                  <td className="font-bold">{fmtDate(b.date)}</td>
                  <td>{b.donor||'Anonymous'}</td>
                  <td>{b.items.length}</td>
                  <td>{totalUnits}</td>
                  <td><span className={`badge ${b.status==='finalized'?'badge-finalized':'badge-pending'}`}>{b.status}</span></td>
                  <td className="text-sm text-muted">{b.notes||'—'}</td>
                  <td>
                    <div style={{display:'flex',gap:6}}>
                      <button className="btn btn-sm btn-outline" onClick={()=>setDetail(b)}>View</button>
                      {b.status==='pending'&&<button className="btn btn-sm btn-success" onClick={()=>finalize(b)}>Finalize</button>}
                      <button className="btn btn-sm btn-danger" onClick={()=>deleteBatch(b.id)}>Del</button>
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {detail&&(
        <Modal show title={`Batch — ${detail.donor||'Anonymous'} (${fmtDate(detail.date)})`} onClose={()=>setDetail(null)} wide
          footer={<>
            <button className="btn btn-outline" onClick={()=>setDetail(null)}>Close</button>
            {detail.status==='pending'&&<button className="btn btn-success" onClick={()=>finalize(detail)}>✅ Finalize</button>}
            <button className="btn btn-danger" onClick={()=>deleteBatch(detail.id)}>Delete Batch</button>
          </>}>
          <div className="table-wrap">
            <table>
              <thead><tr><th>Product</th><th>Animal</th><th>Category</th><th>Qty</th><th>Notes</th></tr></thead>
              <tbody>
                {detail.items.map((item,i)=>{
                  const p=prodMap[item.productId];
                  return(
                    <tr key={i}>
                      <td>{p?p.name:<span className="text-muted">Unknown</span>}</td>
                      <td>{p&&animalBadge(p.animalType)}</td>
                      <td className="text-sm">{p?.category||'—'}</td>
                      <td className="font-bold">{item.qty}</td>
                      <td className="text-sm text-muted">{item.notes||'—'}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </Modal>
      )}
      <ConfirmModal show={!!confirm} message={confirm?.msg} onConfirm={confirm?.cb} onCancel={()=>setConfirm(null)}/>
    </div>
  );
}

// ── INVENTORY ─────────────────────────────────────────────────────────────────
function Inventory({products,inventory,setInventory,navigate}){
  const [search,setSearch]=useState('');
  const [filterType,setFilterType]=useState('All');
  const [editItem,setEditItem]=useState(null);
  const [adjQty,setAdjQty]=useState(0);
  const [adjReason,setAdjReason]=useState('Physical Count');
  const [adjNotes,setAdjNotes]=useState('');
  const [adjBy,setAdjBy]=useState('');
  const [adjustments,setAdjustments]=useState(()=>LS.get('adjustments',[]));

  const inv=useMemo(()=>{const m={};inventory.forEach(i=>m[i.productId]=i.qty);return m;},[inventory]);
  const prodMap=useMemo(()=>{const m={};products.forEach(p=>m[p.id]=p);return m;},[products]);

  const filtered=products.filter(p=>{
    const q=search.toLowerCase();
    const match=!q||(p.name+p.brand+p.upc).toLowerCase().includes(q);
    const typeMatch=filterType==='All'||p.animalType===filterType;
    return match&&typeMatch;
  });

  async function saveAdj(){
    const delta=parseInt(adjQty)||0;
    if(delta===0){alert('Enter a non-zero quantity adjustment.');return;}
    const newQty=Math.max(0,(inv[editItem.productId]||0)+delta);
    const newAdj={id:uid(),productId:editItem.productId,date:today(),qty:delta,reason:adjReason,notes:adjNotes,adjBy};
    setInventory(prev=>prev.map(i=>i.productId===editItem.productId?{...i,qty:newQty}:i));
    setAdjustments(prev=>[newAdj,...prev]);
    // Write adjustment to Supabase
    await sb.from('adjustments').insert({id:newAdj.id,product_id:newAdj.productId,date:newAdj.date,qty:delta,reason:adjReason,notes:adjNotes,adj_by:adjBy});
    setEditItem(null);setAdjQty(0);setAdjNotes('');setAdjBy('');
  }

  function printCountSheet(){
    const rows=filtered.map(p=>`<tr><td>${p.name}</td><td>${p.upc||''}</td><td>${inv[p.id]||0}</td><td></td><td></td></tr>`).join('');
    const w=window.open('','_blank');
    w.document.write(`<html><head><title>DELC Pet Pantry — Inventory Count Sheet</title>
      <style>body{font-family:sans-serif;padding:20px}h2{color:#1a2744}table{width:100%;border-collapse:collapse}th,td{border:1px solid #ccc;padding:8px;font-size:13px}th{background:#f0f2f5}</style></head>
      <body><h2>DELC Pet Pantry — Inventory Count Sheet</h2><p>Date: ${today()}</p>
      <table><thead><tr><th>Product Name</th><th>UPC</th><th>System Qty</th><th>Physical Count</th><th>Notes</th></tr></thead><tbody>${rows}</tbody></table></body></html>`);
    w.print();
  }

  return(
    <div className="page">
      <div className="section-header mb-4">
        <div className="section-title">📦 Inventory</div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-outline" onClick={printCountSheet}>🖨 Count Sheet</button>
          <button className="btn btn-outline" onClick={()=>navigate('adjustments')}>View Adjustments</button>
        </div>
      </div>

      <div className="search-bar">
        <input className="form-control" placeholder="Search products…" value={search} onChange={e=>setSearch(e.target.value)}/>
        <select className="form-control" style={{width:140}} value={filterType} onChange={e=>setFilterType(e.target.value)}>
          <option>All</option>{ANIMAL_TYPES.map(t=><option key={t}>{t}</option>)}
        </select>
      </div>

      <div className="table-wrap">
        <table>
          <thead><tr><th>Product</th><th>UPC</th><th>Animal</th><th>Category</th><th>On Hand</th><th>Status</th><th>Adjust</th></tr></thead>
          <tbody>
            {filtered.length===0&&<tr><td colSpan={7}><div className="empty-state"><div className="icon">📦</div><h3>No products found</h3></div></td></tr>}
            {filtered.map(p=>{
              const q=inv[p.id]||0;
              const invRow=inventory.find(i=>i.productId===p.id);
              return(
                <tr key={p.id}>
                  <td><div className="font-bold text-sm">{p.name}</div><div className="text-xs text-muted">{p.brand}</div></td>
                  <td className="text-sm text-muted">{p.upc||'—'}</td>
                  <td>{animalBadge(p.animalType)}</td>
                  <td className="text-sm">{p.category}</td>
                  <td className="font-bold" style={{fontSize:18}}>{q}</td>
                  <td>{stockBadge(q)}</td>
                  <td><button className="btn btn-sm btn-outline" onClick={()=>{setEditItem(invRow||{productId:p.id});setAdjQty(0);setAdjNotes('');setAdjBy('');}}>± Adjust</button></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {editItem&&(()=>{
        const p=prodMap[editItem.productId];
        const currentQty=inv[editItem.productId]||0;
        return(
          <Modal show title={`Adjust: ${p?.name||'Product'}`} onClose={()=>setEditItem(null)}
            footer={<><button className="btn btn-outline" onClick={()=>setEditItem(null)}>Cancel</button><button className="btn btn-primary" onClick={saveAdj}>Save Adjustment</button></>}>
            <div className="alert alert-info mb-3">Current quantity: <strong>{currentQty}</strong></div>
            <div className="form-group">
              <label className="form-label">Quantity Change (+ to add, - to remove)</label>
              <input type="number" className="form-control lg" value={adjQty}
                onChange={e=>setAdjQty(e.target.value)} placeholder="+5 or -3"/>
            </div>
            <div className="form-group">
              <label className="form-label">Reason *</label>
              <select className="form-control" value={adjReason} onChange={e=>setAdjReason(e.target.value)}>
                {ADJ_REASONS.map(r=><option key={r}>{r}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Adjusted By</label>
              <input className="form-control" value={adjBy} onChange={e=>setAdjBy(e.target.value)} placeholder="Volunteer name"/>
            </div>
            <div className="form-group">
              <label className="form-label">Notes</label>
              <textarea className="form-control" value={adjNotes} onChange={e=>setAdjNotes(e.target.value)} rows={2}/>
            </div>
            <div className="alert alert-warning">New quantity will be: <strong>{Math.max(0,(currentQty)+(parseInt(adjQty)||0))}</strong></div>
          </Modal>
        );
      })()}
    </div>
  );
}


// ── STOCK COUNT ───────────────────────────────────────────────────────────────
function StockCount({products,inventory,setInventory,setDistributions,distributions}){
  const [counts,setCounts]=useState({});
  const [saving,setSaving]=useState(false);
  const [saved,setSaved]=useState(false);
  const [search,setSearch]=useState('');
  const [confirm,setConfirm]=useState(false);
  const [adjReason]=useState('Physical Count');

  const inv=useMemo(()=>{const m={};inventory.forEach(i=>m[i.productId]=i.qty);return m;},[inventory]);

  // Initialize counts from current inventory when page loads
  useEffect(()=>{
    const init={};
    inventory.forEach(i=>{init[i.productId]=i.qty;});
    setCounts(init);
  },[inventory]);

  const SECTIONS=[
    {key:'Cat',label:'🐱 Cat Supplies',icon:'🐱',color:'#7d3c98',bg:'#f3ecfa',cats:['Dry Food','Wet Food','Litter','Accessories']},
    {key:'Dog',label:'🐶 Dog Supplies',icon:'🐶',color:'#a04000',bg:'#fef5ec',cats:['Dry Food','Wet Food','Accessories']},
    {key:'Other',label:'🐾 Other Animals',icon:'🐾',color:'#1a6b3a',bg:'#eafaf1',cats:['Bird','Small Animal','Reptile','Fish','Farm Animal','Other']},
  ];

  function setCount(productId,val){
    const n=parseInt(val);
    setCounts(prev=>({...prev,[productId]:isNaN(n)||n<0?0:n}));
    setSaved(false);
  }

  const changed=useMemo(()=>{
    return Object.entries(counts).filter(([pid,qty])=>(inv[pid]||0)!==qty);
  },[counts,inv]);

  async function saveCount(){
    if(changed.length===0){alert('No changes to save.');return;}
    setSaving(true);
    // Update inventory state + Supabase for each changed item
    const updates={};
    changed.forEach(([pid,qty])=>{updates[pid]=qty;});
    setInventory(prev=>prev.map(i=>updates[i.productId]!==undefined?{...i,qty:updates[i.productId]}:i));
    // Write adjustments to Supabase for audit trail
    const adjRows=changed.map(([pid,qty])=>({
      id:uid(),
      product_id:pid,
      date:today(),
      qty:qty-(inv[pid]||0),
      reason:'Physical Count',
      notes:'Stock count reconciliation',
      adj_by:'Stock Count',
      created_at:new Date().toISOString()
    }));
    await sb.from('adjustments').insert(adjRows);
    setSaving(false);setSaved(true);setConfirm(false);
    setTimeout(()=>setSaved(false),3000);
  }

  const q=search.toLowerCase();
  const filteredProds=products.filter(p=>!q||(p.name+p.brand+p.upc+p.category).toLowerCase().includes(q));

  function getDelta(productId){
    const current=inv[productId]||0;
    const counted=counts[productId]??current;
    return counted-current;
  }

  return(
    <div className="page">
      <div className="section-header mb-4">
        <div>
          <div className="section-title">🔢 Stock Count</div>
          <div className="text-sm text-muted mt-2">Enter physical counts. Changes are highlighted. Save when done to update inventory.</div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {changed.length>0&&(
            <span className="badge badge-pending">{changed.length} change{changed.length!==1?'s':''} pending</span>
          )}
          {saved&&<span className="badge badge-finalized">✅ Saved!</span>}
          <button className="btn btn-success btn-lg" onClick={()=>setConfirm(true)} disabled={saving||changed.length===0}>
            {saving?'Saving…':'✅ Save Count'}
          </button>
        </div>
      </div>

      {changed.length>0&&(
        <div className="alert alert-warning mb-4">
          ⚠️ You have <strong>{changed.length}</strong> unsaved change{changed.length!==1?'s':''}. Click <strong>Save Count</strong> to update inventory and log adjustments.
        </div>
      )}

      <div className="search-bar mb-4">
        <input className="form-control lg" placeholder="Filter products by name, brand, UPC, or category…"
          value={search} onChange={e=>setSearch(e.target.value)}/>
        {search&&<button className="btn btn-outline" onClick={()=>setSearch('')}>Clear</button>}
      </div>

      {SECTIONS.map(section=>{
        const sectionProds=filteredProds.filter(p=>p.animalType===section.key);
        if(sectionProds.length===0) return null;

        return(
          <div key={section.key} style={{marginBottom:28}}>
            {/* Section header */}
            <div style={{background:section.bg,border:`2px solid ${section.color}22`,borderRadius:'var(--radius-lg)',padding:'12px 18px',marginBottom:12,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:26}}>{section.icon}</span>
                <div>
                  <div style={{fontWeight:800,fontSize:17,color:section.color}}>{section.label}</div>
                  <div className="text-xs text-muted">{sectionProds.length} product{sectionProds.length!==1?'s':''}</div>
                </div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontWeight:800,fontSize:20,color:section.color}}>
                  {sectionProds.reduce((s,p)=>s+(counts[p.id]??inv[p.id]??0),0)}
                </div>
                <div className="text-xs text-muted">counted units</div>
              </div>
            </div>

            {/* Group by category within section */}
            {section.cats.map(cat=>{
              const catProds=sectionProds.filter(p=>p.category===cat);
              if(catProds.length===0) return null;
              return(
                <div key={cat} style={{marginBottom:16}}>
                  <div style={{fontSize:12,fontWeight:700,color:'var(--gray-400)',textTransform:'uppercase',letterSpacing:'.08em',padding:'4px 4px 8px',borderBottom:'2px solid var(--gray-200)',marginBottom:8}}>
                    {cat}
                  </div>
                  <div style={{display:'grid',gap:8}}>
                    {catProds.map(p=>{
                      const systemQty=inv[p.id]||0;
                      const counted=counts[p.id]??systemQty;
                      const delta=counted-systemQty;
                      const hasChange=delta!==0;
                      return(
                        <div key={p.id} style={{
                          display:'flex',alignItems:'center',gap:12,
                          padding:'12px 14px',
                          background:hasChange?(delta>0?'#eafaf1':'#fdecea'):'var(--white)',
                          border:`1.5px solid ${hasChange?(delta>0?'#27ae60':'#c0392b'):'var(--gray-200)'}`,
                          borderRadius:'var(--radius)',
                          transition:'all .15s'
                        }}>
                          {/* Product info */}
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontWeight:700,fontSize:14,color:'var(--gray-800)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{p.name}</div>
                            <div className="text-xs text-muted">{p.brand}{p.size?` · ${p.size}`:''}{p.upc?` · ${p.upc}`:''}</div>
                          </div>

                          {/* System qty */}
                          <div style={{textAlign:'center',minWidth:70}}>
                            <div className="text-xs text-muted font-bold" style={{textTransform:'uppercase',letterSpacing:'.04em',marginBottom:2}}>System</div>
                            <div style={{fontSize:18,fontWeight:800,color:'var(--gray-400)'}}>{systemQty}</div>
                          </div>

                          {/* Count input */}
                          <div style={{textAlign:'center',minWidth:110}}>
                            <div className="text-xs font-bold" style={{textTransform:'uppercase',letterSpacing:'.04em',marginBottom:2,color:'var(--navy)'}}>Physical Count</div>
                            <div className="qty-controls" style={{justifyContent:'center'}}>
                              <button className="qty-btn" onClick={()=>setCount(p.id,Math.max(0,counted-1))}>−</button>
                              <input className="qty-num form-control" type="number" min={0} value={counted}
                                onChange={e=>setCount(p.id,e.target.value)}
                                style={{width:60,textAlign:'center',fontWeight:800,fontSize:16,
                                  borderColor:hasChange?(delta>0?'var(--green)':'var(--red)'):'var(--gray-200)',
                                  color:hasChange?(delta>0?'var(--green)':'var(--red)'):'var(--gray-800)'}}/>
                              <button className="qty-btn" onClick={()=>setCount(p.id,counted+1)}>+</button>
                            </div>
                          </div>

                          {/* Delta */}
                          <div style={{minWidth:60,textAlign:'center'}}>
                            {hasChange?(
                              <div>
                                <div style={{fontWeight:800,fontSize:16,color:delta>0?'var(--green)':'var(--red)'}}>
                                  {delta>0?'+':''}{delta}
                                </div>
                                <div className="text-xs" style={{color:delta>0?'var(--green)':'var(--red)'}}>
                                  {delta>0?'gain':'loss'}
                                </div>
                              </div>
                            ):(
                              <span style={{color:'var(--gray-200)',fontSize:20}}>—</span>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        );
      })}

      {filteredProds.length===0&&(
        <div className="card"><div className="empty-state"><div className="icon">🔍</div><h3>No products match your search</h3></div></div>
      )}

      {/* Summary footer if changes */}
      {changed.length>0&&(
        <div className="card mt-4" style={{border:'2px solid var(--navy)',background:'var(--gray-50)'}}>
          <div className="card-header"><span className="card-title">📋 Count Summary — {changed.length} Change{changed.length!==1?'s':''}</span></div>
          <div style={{display:'grid',gap:6}}>
            {changed.map(([pid,newQty])=>{
              const p=products.find(p=>p.id===pid);
              const oldQty=inv[pid]||0;
              const delta=newQty-oldQty;
              return(
                <div key={pid} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:'1px solid var(--gray-100)'}}>
                  <div>
                    <span className="font-bold text-sm">{p?.name||'Unknown'}</span>
                    <span className="text-xs text-muted" style={{marginLeft:8}}>{p?.animalType} · {p?.category}</span>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:12}}>
                    <span className="text-sm text-muted">{oldQty} → <strong>{newQty}</strong></span>
                    <span style={{fontWeight:700,color:delta>0?'var(--green)':'var(--red)',minWidth:40,textAlign:'right'}}>
                      {delta>0?'+':''}{delta}
                    </span>
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{display:'flex',justifyContent:'flex-end',marginTop:14}}>
            <button className="btn btn-success btn-lg" onClick={()=>setConfirm(true)} disabled={saving}>
              {saving?'Saving…':'✅ Save Count & Update Inventory'}
            </button>
          </div>
        </div>
      )}

      <ConfirmModal show={confirm}
        message={`Save physical count? ${changed.length} product${changed.length!==1?'s':''} will be updated and adjustments will be logged for each change.`}
        onConfirm={saveCount} onCancel={()=>setConfirm(false)}/>
    </div>
  );
}

// ── ADJUSTMENTS LOG ───────────────────────────────────────────────────────────
function AdjustmentsLog({products}){
  const [adjustments]=useState(()=>LS.get('adjustments',[]));
  const prodMap=useMemo(()=>{const m={};products.forEach(p=>m[p.id]=p);return m;},[products]);
  const sorted=[...adjustments].sort((a,b)=>b.date.localeCompare(a.date));
  return(
    <div className="page">
      <div className="section-header mb-4"><div className="section-title">📊 Inventory Adjustments</div></div>
      <div className="table-wrap">
        <table>
          <thead><tr><th>Date</th><th>Product</th><th>Change</th><th>Reason</th><th>Adjusted By</th><th>Notes</th></tr></thead>
          <tbody>
            {sorted.length===0&&<tr><td colSpan={6}><div className="empty-state"><div className="icon">📊</div><h3>No adjustments yet</h3></div></td></tr>}
            {sorted.map(a=>{
              const p=prodMap[a.productId];
              return(
                <tr key={a.id}>
                  <td>{fmtDate(a.date)}</td>
                  <td className="font-bold">{p?.name||'Unknown'}</td>
                  <td><span style={{color:a.qty>=0?'var(--green)':'var(--red)',fontWeight:700}}>{a.qty>=0?'+':''}{a.qty}</span></td>
                  <td><span className="badge badge-pending">{a.reason}</span></td>
                  <td>{a.adjBy||'—'}</td>
                  <td className="text-sm text-muted">{a.notes||'—'}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── CLIENTS ───────────────────────────────────────────────────────────────────
function Clients({clients,setClients,distributions,setDistributions,products,inventory,setInventory,navigate,params}){
  const [search,setSearch]=useState('');
  const [showModal,setShowModal]=useState(false);
  const [editClient,setEditClient]=useState(null);
  const [selectedClient,setSelectedClient]=useState(null);
  const [deleteConfirm,setDeleteConfirm]=useState(null);

  function printClientHistory(id){
    const cl=clients.find(c=>c.id===id);
    if(!cl) return;
    const cDists=distributions.filter(d=>d.clientId===id).sort((a,b)=>b.date.localeCompare(a.date));
    const rows=cDists.map(d=>{
      const items=d.items.map(i=>{
        const p=products.find(p=>p.id===i.productId);
        return `<tr><td style="padding:6px 10px;border:1px solid #ccc">${p?p.name:'Unknown'}</td><td style="padding:6px 10px;border:1px solid #ccc">${p?p.animalType:''}</td><td style="padding:6px 10px;border:1px solid #ccc">${p?p.category:''}</td><td style="padding:6px 10px;border:1px solid #ccc;text-align:center">${i.qty}</td></tr>`;
      }).join('');
      return `<tr><td colspan="4" style="background:#f0f2f5;padding:8px 10px;font-weight:700;border:1px solid #ccc">${fmtDate(d.date)}${d.notes?' — '+d.notes:''}</td></tr>${items}`;
    }).join('');
    const petsHtml=(cl.pets||[]).map(p=>`<li>${p.name} (${p.animalType}${p.breed?', '+p.breed:''}${p.age?', age '+p.age:''}${p.foodPref?', prefers: '+p.foodPref:''}${p.specialNotes?' — '+p.specialNotes:''})</li>`).join('');
    const w=window.open('','_blank');
    w.document.write(`<html><head><title>Client History — ${cl.firstName} ${cl.lastName}</title>
    <style>body{font-family:sans-serif;padding:30px;max-width:800px;margin:0 auto}h1{color:#1a2744}h2{color:#1a2744;font-size:15px;margin-top:20px}table{width:100%;border-collapse:collapse;margin-bottom:16px}th{background:#f0f2f5;padding:8px 10px;border:1px solid #ccc;text-align:left}p{margin:4px 0;font-size:14px}ul{margin:4px 0;font-size:14px}</style></head>
    <body>
    <h1>DELC Pet Pantry — Client Record</h1>
    <p><strong>${cl.firstName} ${cl.lastName}</strong></p>
    ${cl.phone?`<p>📞 ${cl.phone}</p>`:''}${cl.email?`<p>✉️ ${cl.email}</p>`:''}${cl.address?`<p>📍 ${cl.address}</p>`:''}${cl.notes?`<p><em>Notes: ${cl.notes}</em></p>`:''}
    <h2>Animals (${(cl.pets||[]).length})</h2>
    ${petsHtml?`<ul>${petsHtml}</ul>`:'<p>None on file.</p>'}
    <h2>Pickup History (${cDists.length} visit${cDists.length!==1?'s':''})</h2>
    ${cDists.length?`<table><thead><tr><th>Product</th><th>Animal</th><th>Category</th><th>Qty</th></tr></thead><tbody>${rows}</tbody></table>`:'<p>No pickups on file.</p>'}
    <p style="margin-top:30px;font-size:12px;color:#aaa">Printed ${new Date().toLocaleDateString()} — DELC Pet Pantry</p>
    </body></html>`);
    w.print();
  }

  async function deleteClient(id){
    const clientDists=distributions.filter(d=>d.clientId===id).map(d=>d.id);
    if(clientDists.length){
      await sb.from('distribution_items').delete().in('distribution_id',clientDists);
      await sb.from('distributions').delete().eq('client_id',id);
    }
    await sb.from('pets').delete().eq('client_id',id);
    await sb.from('clients').delete().eq('id',id);
    setClients(prev=>prev.filter(c=>c.id!==id));
    setDistributions(prev=>prev.filter(d=>d.clientId!==id));
    setDeleteConfirm(null);
    if(selectedClient?.id===id) setSelectedClient(null);
  }
  const [editDist,setEditDist]=useState(null);  // distribution being edited
  const [editDistItems,setEditDistItems]=useState([]);
  const [editDistDate,setEditDistDate]=useState('');
  const [editDistNotes,setEditDistNotes]=useState('');
  const [editUpcInput,setEditUpcInput]=useState('');
  const [editConfirm,setEditConfirm]=useState(false);
  const [deleteDistConfirm,setDeleteDistConfirm]=useState(null);

  async function deleteDistribution(id){
    // Return items to inventory
    const dist=distributions.find(d=>d.id===id);
    if(dist){
      const updates={};
      dist.items.forEach(i=>{updates[i.productId]=(updates[i.productId]||0)+i.qty;});
      setInventory(prev=>prev.map(i=>updates[i.productId]?{...i,qty:i.qty+updates[i.productId]}:i));
    }
    await sb.from('distribution_items').delete().eq('distribution_id',id);
    await sb.from('distributions').delete().eq('id',id);
    setDistributions(prev=>prev.filter(d=>d.id!==id));
    setDeleteDistConfirm(null);
  }

  const inv=useMemo(()=>{const m={};inventory.forEach(i=>m[i.productId]=i.qty);return m;},[inventory]);

  function openEditDist(d){
    setEditDist(d);
    setEditDistItems(d.items.map(i=>({...i,id:i.id||uid()})));
    setEditDistDate(d.date);
    setEditDistNotes(d.notes||'');
    setEditUpcInput('');
  }

  function closeEditDist(){setEditDist(null);setEditDistItems([]);setEditConfirm(false);}

  function editDistAddByUPC(){
    const code=editUpcInput.trim();
    if(!code) return;
    const prod=products.find(p=>p.upc===code);
    if(!prod){alert('Product not found in master.');return;}
    const existing=editDistItems.findIndex(i=>i.productId===prod.id);
    if(existing>=0){
      setEditDistItems(prev=>prev.map((it,i)=>i===existing?{...it,qty:it.qty+1}:it));
    } else {
      setEditDistItems(prev=>[...prev,{id:uid(),productId:prod.id,qty:1,notes:''}]);
    }
    setEditUpcInput('');
  }

  function editDistAddProduct(p){
    const existing=editDistItems.findIndex(i=>i.productId===p.id);
    if(existing>=0){setEditDistItems(prev=>prev.map((it,i)=>i===existing?{...it,qty:it.qty+1}:it));}
    else{setEditDistItems(prev=>[...prev,{id:uid(),productId:p.id,qty:1,notes:''}]);}
  }

  function saveEditDist(){
    // Reconcile inventory: reverse original, apply new
    const originalMap={};
    editDist.items.forEach(i=>{originalMap[i.productId]=(originalMap[i.productId]||0)+i.qty;});
    const newMap={};
    editDistItems.forEach(i=>{newMap[i.productId]=(newMap[i.productId]||0)+i.qty;});

    // Check stock for any increases (new qty - original qty > available)
    for(const item of editDistItems){
      const origQty=originalMap[item.productId]||0;
      const delta=item.qty-origQty; // positive = need more from inventory
      if(delta>0&&(inv[item.productId]||0)<delta){
        const p=products.find(p=>p.id===item.productId);
        alert(`Not enough stock for ${p?.name}. Only ${inv[item.productId]||0} additional units available.`);
        return;
      }
    }

    // Build inventory adjustments: +original, -new (net effect)
    setInventory(prev=>prev.map(i=>{
      const wasGiven=originalMap[i.productId]||0;
      const nowGiven=newMap[i.productId]||0;
      const delta=wasGiven-nowGiven; // positive = returning to stock, negative = taking more
      return delta!==0?{...i,qty:i.qty+delta}:i;
    }));

    // Save updated distribution
    setDistributions(prev=>prev.map(d=>d.id===editDist.id
      ?{...d,date:editDistDate,notes:editDistNotes,items:editDistItems.map(i=>({productId:i.productId,qty:i.qty,notes:i.notes||''}))}
      :d
    ));
    closeEditDist();
  }

  useEffect(()=>{
    if(params?.clientId){
      const cl=clients.find(c=>c.id===params.clientId);
      if(cl) setSelectedClient(cl);
    }
  },[params]);

  const filtered=clients.filter(c=>{
    const q=search.toLowerCase();
    return !q||(c.firstName+' '+c.lastName+c.phone+c.email).toLowerCase().includes(q);
  });

  function ClientForm({client,onSave,onCancel}){
    const [form,setForm]=useState(client||{firstName:'',lastName:'',phone:'',email:'',address:'',notes:'',pets:[]});
    const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
    const [petModal,setPetModal]=useState(false);
    const [editPet,setEditPet]=useState(null);
    const [petForm,setPetForm]=useState({name:'',animalType:'Cat',breed:'',age:'',specialNotes:'',foodPref:''});

    function savePet(){
      if(!petForm.name.trim()){alert('Pet name required');return;}
      if(editPet){
        setForm(f=>({...f,pets:f.pets.map(p=>p.id===editPet.id?{...p,...petForm}:p)}));
      } else {
        setForm(f=>({...f,pets:[...f.pets,{...petForm,id:uid()}]}));
      }
      setPetModal(false);setEditPet(null);setPetForm({name:'',animalType:'Cat',breed:'',age:'',specialNotes:'',foodPref:''});
    }

    return(
      <div>
        <div className="grid-2">
          <div className="form-group"><label className="form-label">First Name *</label><input className="form-control" value={form.firstName} onChange={set('firstName')} required/></div>
          <div className="form-group"><label className="form-label">Last Name *</label><input className="form-control" value={form.lastName} onChange={set('lastName')} required/></div>
          <div className="form-group"><label className="form-label">Phone</label><input className="form-control" value={form.phone} onChange={set('phone')} type="tel"/></div>
          <div className="form-group"><label className="form-label">Email</label><input className="form-control" value={form.email} onChange={set('email')} type="email"/></div>
        </div>
        <div className="form-group"><label className="form-label">Address</label><input className="form-control" value={form.address} onChange={set('address')}/></div>
        <div className="form-group"><label className="form-label">Notes</label><textarea className="form-control" value={form.notes} onChange={set('notes')} rows={2}/></div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <strong>Animals ({form.pets.length})</strong>
          <button type="button" className="btn btn-sm btn-outline" onClick={()=>{setPetModal(true);setEditPet(null);setPetForm({name:'',animalType:'Cat',breed:'',age:'',specialNotes:'',foodPref:''});}}>+ Add Animal</button>
        </div>
        {form.pets.map(pet=>(
          <div key={pet.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px',border:'1.5px solid var(--gray-200)',borderRadius:'var(--radius)',marginBottom:6}}>
            <span style={{fontSize:22}}>{pet.animalType==='Cat'?'🐱':pet.animalType==='Dog'?'🐶':'🐾'}</span>
            <div style={{flex:1}}>
              <div className="font-bold text-sm">{pet.name}</div>
              <div className="text-xs text-muted">{pet.animalType} · {pet.breed||'Unknown breed'} · Age: {pet.age||'?'}</div>
            </div>
            <button className="btn btn-sm btn-outline" onClick={()=>{setEditPet(pet);setPetForm(pet);setPetModal(true);}}>Edit</button>
            <button className="btn btn-sm btn-danger" onClick={()=>setForm(f=>({...f,pets:f.pets.filter(p=>p.id!==pet.id)}))}>✕</button>
          </div>
        ))}
        <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:12}}>
          <button className="btn btn-outline" onClick={onCancel}>Cancel</button>
          <button className="btn btn-primary" onClick={()=>{if(!form.firstName||!form.lastName){alert('Name required');return;}onSave(form);}}>Save Client</button>
        </div>
        <Modal show={petModal} title={editPet?'Edit Animal':'Add Animal'} onClose={()=>setPetModal(false)}
          footer={<><button className="btn btn-outline" onClick={()=>setPetModal(false)}>Cancel</button><button className="btn btn-primary" onClick={savePet}>Save Animal</button></>}>
          <div className="grid-2">
            <div className="form-group"><label className="form-label">Name *</label><input className="form-control" value={petForm.name} onChange={e=>setPetForm(f=>({...f,name:e.target.value}))}/></div>
            <div className="form-group"><label className="form-label">Animal Type</label>
              <select className="form-control" value={petForm.animalType} onChange={e=>setPetForm(f=>({...f,animalType:e.target.value}))}>
                {ANIMAL_TYPES.map(t=><option key={t}>{t}</option>)}
              </select>
            </div>
            <div className="form-group"><label className="form-label">Breed</label><input className="form-control" value={petForm.breed} onChange={e=>setPetForm(f=>({...f,breed:e.target.value}))}/></div>
            <div className="form-group"><label className="form-label">Age</label><input className="form-control" value={petForm.age} onChange={e=>setPetForm(f=>({...f,age:e.target.value}))}/></div>
          </div>
          <div className="form-group"><label className="form-label">Food Preferences</label><input className="form-control" value={petForm.foodPref} onChange={e=>setPetForm(f=>({...f,foodPref:e.target.value}))}/></div>
          <div className="form-group"><label className="form-label">Special Notes</label><textarea className="form-control" rows={2} value={petForm.specialNotes} onChange={e=>setPetForm(f=>({...f,specialNotes:e.target.value}))}/></div>
        </Modal>
      </div>
    );
  }

  function saveClient(form){
    if(editClient){
      setClients(prev=>prev.map(c=>c.id===editClient.id?{...c,...form}:c));
    } else {
      setClients(prev=>[...prev,{...form,id:uid()}]);
    }
    setShowModal(false);setEditClient(null);
  }

  if(selectedClient){
    const cl=clients.find(c=>c.id===selectedClient.id)||selectedClient;
    const clDists=distributions.filter(d=>d.clientId===cl.id).sort((a,b)=>b.date.localeCompare(a.date));
    return(
      <div className="page">
        <div className="section-header mb-4">
          <button className="btn btn-outline" onClick={()=>setSelectedClient(null)}>← Back to Clients</button>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-outline" onClick={()=>{setEditClient(cl);setShowModal(true)}}>Edit Client</button>
            <button className="btn btn-gold" onClick={()=>navigate('pickup',{clientId:cl.id})}>🛍 Record Pickup</button>
            <button className="btn btn-danger" onClick={()=>setDeleteConfirm(cl.id)}>🗑 Delete</button>
          </div>
        </div>
        <div className="grid-2 mb-4">
          <div className="card">
            <div className="card-header"><span className="card-title">👤 {cl.firstName} {cl.lastName}</span></div>
            {cl.phone&&<div className="text-sm mb-2">📞 {cl.phone}</div>}
            {cl.email&&<div className="text-sm mb-2">✉️ {cl.email}</div>}
            {cl.address&&<div className="text-sm mb-2">📍 {cl.address}</div>}
            {cl.notes&&<div className="alert alert-info mt-3 text-sm">{cl.notes}</div>}
          </div>
          <div className="card">
            <div className="card-header"><span className="card-title">🐾 Animals ({cl.pets?.length||0})</span></div>
            {(cl.pets||[]).length===0&&<div className="text-sm text-muted">No animals on file.</div>}
            {(cl.pets||[]).map(pet=>(
              <div key={pet.id} style={{padding:'10px 0',borderBottom:'1px solid var(--gray-100)'}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:20}}>{pet.animalType==='Cat'?'🐱':pet.animalType==='Dog'?'🐶':'🐾'}</span>
                  <div>
                    <div className="font-bold text-sm">{pet.name}</div>
                    <div className="text-xs text-muted">{pet.breed||'Unknown'} · Age: {pet.age||'?'}</div>
                  </div>
                </div>
                {pet.foodPref&&<div className="text-xs text-muted mt-1">🍽 {pet.foodPref}</div>}
                {pet.specialNotes&&<div className="text-xs text-muted">📝 {pet.specialNotes}</div>}
              </div>
            ))}
          </div>
        </div>
        <div className="card">
          <div className="card-header"><span className="card-title">📦 Pickup History ({clDists.length})</span></div>
          {clDists.length===0&&<div className="empty-state" style={{padding:24}}><div className="icon">🛍</div><h3>No pickups yet</h3></div>}
          {clDists.map(d=>{
            const totalUnits=d.items.reduce((s,i)=>s+i.qty,0);
            return(
              <div key={d.id} style={{borderBottom:'1px solid var(--gray-100)',padding:'12px 0'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                  <div>
                    <span className="font-bold text-sm">{fmtDate(d.date)}</span>
                    <span className="text-xs text-muted" style={{marginLeft:10}}>{d.items.length} product{d.items.length!==1?'s':''} · {totalUnits} unit{totalUnits!==1?'s':''}</span>
                    {d.notes&&<span className="text-xs text-muted" style={{marginLeft:10}}>· {d.notes}</span>}
                  </div>
                  <div style={{display:'flex',gap:6}}>
                    <button className="btn btn-sm btn-outline" onClick={()=>openEditDist(d)}>✏️ Edit</button>
                    <button className="btn btn-sm btn-danger" onClick={()=>setDeleteDistConfirm(d.id)}>🗑</button>
                  </div>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:4,paddingLeft:10,borderLeft:'3px solid var(--gray-200)'}}>
                  {d.items.map((item,idx)=>{
                    const p=products.find(p=>p.id===item.productId);
                    return(
                      <div key={idx} style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                        <div>
                          <span className="text-sm">{p?p.name:<span className="text-muted">Unknown product</span>}</span>
                          {p&&<span className="text-xs text-muted" style={{marginLeft:8}}>{p.brand}{p.size?` · ${p.size}`:''}</span>}
                        </div>
                        <div style={{display:'flex',alignItems:'center',gap:8}}>
                          {p&&animalBadge(p.animalType)}
                          <span className="badge badge-pending">×{item.qty}</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>

        {/* Edit Pickup Modal */}
        {editDist&&(
          <Modal show onClose={closeEditDist} title={`Edit Pickup — ${fmtDate(editDist.date)}`} wide
            footer={<>
              <button className="btn btn-outline" onClick={closeEditDist}>Cancel</button>
              <button className="btn btn-success" onClick={()=>setEditConfirm(true)} disabled={editDistItems.length===0}>✅ Save Changes</button>
            </>}>
            <div className="alert alert-info mb-3">
              You can add new items, adjust quantities, or remove items. Inventory will be updated automatically to reflect the difference.
            </div>
            <div className="grid-2 mb-3">
              <div className="form-group" style={{margin:0}}>
                <label className="form-label">Pickup Date</label>
                <input type="date" className="form-control" value={editDistDate} onChange={e=>setEditDistDate(e.target.value)}/>
              </div>
              <div className="form-group" style={{margin:0}}>
                <label className="form-label">Notes</label>
                <input className="form-control" value={editDistNotes} onChange={e=>setEditDistNotes(e.target.value)} placeholder="Optional notes"/>
              </div>
            </div>

            {/* UPC scan bar */}
            <div className="upc-bar mb-3" style={{padding:12}}>
              <span style={{color:'var(--gold)',fontWeight:700,fontSize:13}}>📡 Add by UPC</span>
              <input className="upc-input" style={{fontSize:14,padding:'8px 12px'}} placeholder="Scan or type UPC…"
                value={editUpcInput} onChange={e=>setEditUpcInput(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&editDistAddByUPC()}/>
              <button className="btn btn-gold btn-sm" onClick={editDistAddByUPC}>Add</button>
            </div>

            {/* Current items */}
            <div style={{marginBottom:12}}>
              {editDistItems.length===0&&<div className="text-sm text-muted">No items — add some above.</div>}
              {editDistItems.map((item,idx)=>{
                const p=products.find(p=>p.id===item.productId);
                const origItem=editDist.items.find(i=>i.productId===item.productId);
                const origQty=origItem?.qty||0;
                const avail=(inv[item.productId]||0)+(origQty); // available = current stock + what was originally taken
                return(
                  <div key={item.id} className="batch-line">
                    <div style={{flex:1}}>
                      <div className="font-bold text-sm">{p?.name||'Unknown'}</div>
                      <div className="text-xs text-muted">{p?.brand} {p?.size&&`· ${p.size}`}
                        {origQty>0&&<span style={{marginLeft:8,color:'var(--gray-400)'}}>Originally: {origQty}</span>}
                      </div>
                    </div>
                    <div className="qty-controls">
                      <button className="qty-btn" onClick={()=>setEditDistItems(prev=>prev.map((it,i)=>i===idx?{...it,qty:Math.max(1,it.qty-1)}:it))}>−</button>
                      <input className="qty-num form-control" type="number" min={1} value={item.qty}
                        onChange={e=>setEditDistItems(prev=>prev.map((it,i)=>i===idx?{...it,qty:parseInt(e.target.value)||1}:it))}/>
                      <button className="qty-btn" onClick={()=>setEditDistItems(prev=>prev.map((it,i)=>i===idx?{...it,qty:it.qty+1}:it))}>+</button>
                    </div>
                    <button className="btn btn-sm btn-danger" onClick={()=>setEditDistItems(prev=>prev.filter((_,i)=>i!==idx))}>✕</button>
                  </div>
                );
              })}
            </div>

            {/* Quick-add from available inventory */}
            <div>
              <div className="text-xs text-muted font-bold mb-2" style={{textTransform:'uppercase',letterSpacing:'.05em'}}>Quick Add from Inventory</div>
              <div style={{maxHeight:180,overflowY:'auto',border:'1px solid var(--gray-200)',borderRadius:'var(--radius)'}}>
                {products.filter(p=>{
                  const alreadyIn=editDistItems.find(i=>i.productId===p.id);
                  const origItem=editDist.items.find(i=>i.productId===p.id);
                  const effectiveStock=(inv[p.id]||0)+(origItem?.qty||0);
                  return effectiveStock>0||alreadyIn;
                }).map(p=>{
                  const origItem=editDist.items.find(i=>i.productId===p.id);
                  const effectiveStock=(inv[p.id]||0)+(origItem?.qty||0);
                  return(
                    <div key={p.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 12px',borderBottom:'1px solid var(--gray-100)',cursor:'pointer'}}
                      onClick={()=>editDistAddProduct(p)}>
                      <div>
                        <span className="text-sm font-bold">{p.name}</span>
                        <span className="text-xs text-muted" style={{marginLeft:8}}>{p.animalType} · {p.category}</span>
                      </div>
                      <div style={{display:'flex',gap:8,alignItems:'center'}}>
                        <span className="text-xs text-muted">{effectiveStock} avail.</span>
                        <button className="btn btn-sm btn-outline" onClick={e=>{e.stopPropagation();editDistAddProduct(p);}}>+ Add</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </Modal>
        )}

        <ConfirmModal show={editConfirm}
          message={`Save changes to this pickup? Inventory will be adjusted to reflect any differences from the original.`}
          onConfirm={saveEditDist} onCancel={()=>setEditConfirm(false)}/>
        <ConfirmModal show={!!deleteDistConfirm}
          message="Delete this pickup record? Items will be returned to inventory."
          onConfirm={()=>deleteDistribution(deleteDistConfirm)} onCancel={()=>setDeleteDistConfirm(null)}/>

        <Modal show={showModal} onClose={()=>{setShowModal(false);setEditClient(null)}} title="Edit Client" wide>
          <ClientForm client={editClient} onSave={saveClient} onCancel={()=>{setShowModal(false);setEditClient(null)}}/>
        </Modal>
        {deleteConfirm&&selectedClient?.id===deleteConfirm&&(()=>{
          const dc=clients.find(c=>c.id===deleteConfirm);
          const dcDists=distributions.filter(d=>d.clientId===deleteConfirm);
          return(
            <Modal show onClose={()=>setDeleteConfirm(null)} title={`Delete ${dc?.firstName||''} ${dc?.lastName||''}?`}
              footer={<>
                <button className="btn btn-outline" onClick={()=>setDeleteConfirm(null)}>Cancel — Keep Client</button>
                {dcDists.length>0&&<button className="btn btn-outline" onClick={()=>{printClientHistory(deleteConfirm);deleteClient(deleteConfirm);}}>🖨 Print History &amp; Delete</button>}
                <button className="btn btn-danger" onClick={()=>deleteClient(deleteConfirm)}>🗑 Delete Without Printing</button>
              </>}>
              {dcDists.length>0?(
                <div>
                  <div className="alert alert-warning mb-3">
                    ⚠️ <strong>{dc?.firstName} {dc?.lastName}</strong> has <strong>{dcDists.length} pickup record{dcDists.length!==1?'s':''}</strong> on file. Deleting will permanently remove this client and all their history.
                  </div>
                  <div className="text-sm mb-2">Would you like to <strong>print their history</strong> before deleting?</div>
                  <div className="text-xs text-muted">The print option will open a printable summary of all their visits, then delete the record.</div>
                </div>
              ):(
                <div className="text-sm">This client has no pickup history. Are you sure you want to delete them?</div>
              )}
            </Modal>
          );
        })()}
      </div>
    );
  }

  return(
    <div className="page">
      <div className="section-header mb-4">
        <div className="section-title">👥 Clients ({clients.length})</div>
        <button className="btn btn-primary" onClick={()=>{setEditClient(null);setShowModal(true)}}>+ Add Client</button>
      </div>
      <div className="search-bar mb-4">
        <input className="form-control" placeholder="Search by name, phone, or email…" value={search} onChange={e=>setSearch(e.target.value)}/>
      </div>
      <div className="grid-3">
        {filtered.length===0&&<div className="card" style={{gridColumn:'1/-1'}}><div className="empty-state"><div className="icon">👥</div><h3>No clients found</h3></div></div>}
        {filtered.map(c=>(
          <div key={c.id} className="client-card" onClick={()=>setSelectedClient(c)}>
            <div style={{display:'flex',gap:12,alignItems:'flex-start'}}>
              <div className="client-avatar">{c.firstName[0]}{c.lastName[0]}</div>
              <div style={{flex:1}}>
                <div className="font-bold">{c.firstName} {c.lastName}</div>
                {c.phone&&<div className="text-sm text-muted">📞 {c.phone}</div>}
                {c.email&&<div className="text-sm text-muted" style={{fontSize:12}}>✉️ {c.email}</div>}
                <div style={{marginTop:6,display:'flex',gap:6,flexWrap:'wrap'}}>
                  {(c.pets||[]).map(pet=>(
                    <span key={pet.id} className={`badge ${pet.animalType==='Cat'?'badge-cat':pet.animalType==='Dog'?'badge-dog':'badge-other'}`}>
                      {pet.animalType==='Cat'?'🐱':pet.animalType==='Dog'?'🐶':'🐾'} {pet.name}

      <Modal show={showModal} onClose={()=>{setShowModal(false);setEditClient(null)}} title={editClient?'Edit Client':'Add New Client'} wide>
        <ClientForm client={editClient} onSave={saveClient} onCancel={()=>{setShowModal(false);setEditClient(null)}}/>
      </Modal>
      {deleteConfirm&&!selectedClient&&(()=>{
        const dc=clients.find(c=>c.id===deleteConfirm);
        const dcDists=distributions.filter(d=>d.clientId===deleteConfirm);
        return(
          <Modal show onClose={()=>setDeleteConfirm(null)} title={`Delete ${dc?.firstName||''} ${dc?.lastName||''}?`}

              {dcDists.length>0&&<button className="btn btn-outline" onClick={()=>{printClientHistory(deleteConfirm);deleteClient(deleteConfirm);}}>🖨 Print History &amp; Delete</button>}

                </div>
                <div className="text-sm mb-2">Would you like to <strong>print their history</strong> before deleting?</div>
                <div className="text-xs text-muted">The print option will open a printable summary of all their visits, then delete the record.</div>
