// ── CLIENTS ───────────────────────────────────────────────────────────────────
function Clients({clients,setClients,distributions,setDistributions,products,inventory,setInventory,navigate,params}){
  const [search,setSearch]=useState('');
  const [showModal,setShowModal]=useState(false);
  const [editClient,setEditClient]=useState(null);
  const [selectedClient,setSelectedClient]=useState(null);
  const [editDist,setEditDist]=useState(null);  // distribution being edited
  const [editDistItems,setEditDistItems]=useState([]);
  const [editDistDate,setEditDistDate]=useState('');
  const [editDistNotes,setEditDistNotes]=useState('');
  const [editUpcInput,setEditUpcInput]=useState('');
  const [editConfirm,setEditConfirm]=useState(false);

  const inv=useMemo(()=>{const m={};inventory.forEach(i=>m[i.productId]=i.qty);return m;},[inventory]);

  function openEditDist(d){
    setEditDist(d);
    setEditDistItems(d.items.map(i=>({...i,id:i.id||uid()})));
    setEditDistDate(d.date);
    setEditDistNotes(d.notes||'');
    setEditUpcInput('');
  }

  function closeEditDist(){setEditDist(null);setEditDistItems([]);setEditConfirm(false);}

  function editDistAddByUPC(){
    const code=editUpcInput.trim();
    if(!code) return;
    const prod=products.find(p=>p.upc===code);
    if(!prod){alert('Product not found in master.');return;}
    const existing=editDistItems.findIndex(i=>i.productId===prod.id);
    if(existing>=0){
      setEditDistItems(prev=>prev.map((it,i)=>i===existing?{...it,qty:it.qty+1}:it));
    } else {
      setEditDistItems(prev=>[...prev,{id:uid(),productId:prod.id,qty:1,notes:''}]);
    }
    setEditUpcInput('');
  }

  function editDistAddProduct(p){
    const existing=editDistItems.findIndex(i=>i.productId===p.id);
    if(existing>=0){setEditDistItems(prev=>prev.map((it,i)=>i===existing?{...it,qty:it.qty+1}:it));}
    else{setEditDistItems(prev=>[...prev,{id:uid(),productId:p.id,qty:1,notes:''}]);}
  }

  function saveEditDist(){
    // Reconcile inventory: reverse original, apply new
    const originalMap={};
    editDist.items.forEach(i=>{originalMap[i.productId]=(originalMap[i.productId]||0)+i.qty;});
    const newMap={};
    editDistItems.forEach(i=>{newMap[i.productId]=(newMap[i.productId]||0)+i.qty;});

    // Check stock for any increases (new qty - original qty > available)
    for(const item of editDistItems){
      const origQty=originalMap[item.productId]||0;
      const delta=item.qty-origQty; // positive = need more from inventory
      if(delta>0&&(inv[item.productId]||0)<delta){
        const p=products.find(p=>p.id===item.productId);
        alert(`Not enough stock for ${p?.name}. Only ${inv[item.productId]||0} additional units available.`);
        return;
      }
    }

    // Build inventory adjustments: +original, -new (net effect)
    setInventory(prev=>prev.map(i=>{
      const wasGiven=originalMap[i.productId]||0;
      const nowGiven=newMap[i.productId]||0;
      const delta=wasGiven-nowGiven; // positive = returning to stock, negative = taking more
      return delta!==0?{...i,qty:i.qty+delta}:i;
    }));

    // Save updated distribution
    setDistributions(prev=>prev.map(d=>d.id===editDist.id
      ?{...d,date:editDistDate,notes:editDistNotes,items:editDistItems.map(i=>({productId:i.productId,qty:i.qty,notes:i.notes||''}))}
      :d
    ));
    closeEditDist();
  }

  useEffect(()=>{
    if(params?.clientId){
      const cl=clients.find(c=>c.id===params.clientId);
      if(cl) setSelectedClient(cl);
    }
  },[params]);

  const filtered=clients.filter(c=>{
    const q=search.toLowerCase();
    return !q||(c.firstName+' '+c.lastName+c.phone+c.email).toLowerCase().includes(q);
  });

  function ClientForm({client,onSave,onCancel}){
    const [form,setForm]=useState(client||{firstName:'',lastName:'',phone:'',email:'',address:'',notes:'',pets:[]});
    const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
    const [petModal,setPetModal]=useState(false);
    const [editPet,setEditPet]=useState(null);
    const [petForm,setPetForm]=useState({name:'',animalType:'Cat',breed:'',age:'',specialNotes:'',foodPref:''});

    function savePet(){
      if(!petForm.name.trim()){alert('Pet name required');return;}
      if(editPet){
        setForm(f=>({...f,pets:f.pets.map(p=>p.id===editPet.id?{...p,...petForm}:p)}));
      } else {
        setForm(f=>({...f,pets:[...f.pets,{...petForm,id:uid()}]}));
      }
      setPetModal(false);setEditPet(null);setPetForm({name:'',animalType:'Cat',breed:'',age:'',specialNotes:'',foodPref:''});
    }

    return(
      <div>
        <div className="grid-2">
          <div className="form-group"><label className="form-label">First Name *</label><input className="form-control" value={form.firstName} onChange={set('firstName')} required/></div>
          <div className="form-group"><label className="form-label">Last Name *</label><input className="form-control" value={form.lastName} onChange={set('lastName')} required/></div>
          <div className="form-group"><label className="form-label">Phone</label><input className="form-control" value={form.phone} onChange={set('phone')} type="tel"/></div>
          <div className="form-group"><label className="form-label">Email</label><input className="form-control" value={form.email} onChange={set('email')} type="email"/></div>
        </div>
        <div className="form-group"><label className="form-label">Address</label><input className="form-control" value={form.address} onChange={set('address')}/></div>
        <div className="form-group"><label className="form-label">Notes</label><textarea className="form-control" value={form.notes} onChange={set('notes')} rows={2}/></div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <strong>Animals ({form.pets.length})</strong>
          <button type="button" className="btn btn-sm btn-outline" onClick={()=>{setPetModal(true);setEditPet(null);setPetForm({name:'',animalType:'Cat',breed:'',age:'',specialNotes:'',foodPref:''});}}>+ Add Animal</button>
        </div>
        {form.pets.map(pet=>(
          <div key={pet.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px',border:'1.5px solid var(--gray-200)',borderRadius:'var(--radius)',marginBottom:6}}>
            <span style={{fontSize:22}}>{pet.animalType==='Cat'?'🐱':pet.animalType==='Dog'?'🐶':'🐾'}</span>
            <div style={{flex:1}}>
              <div className="font-bold text-sm">{pet.name}</div>
              <div className="text-xs text-muted">{pet.animalType} · {pet.breed||'Unknown breed'} · Age: {pet.age||'?'}</div>
            </div>
            <button className="btn btn-sm btn-outline" onClick={()=>{setEditPet(pet);setPetForm(pet);setPetModal(true);}}>Edit</button>
            <button className="btn btn-sm btn-danger" onClick={()=>setForm(f=>({...f,pets:f.pets.filter(p=>p.id!==pet.id)}))}>✕</button>
          </div>
        ))}
        <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:12}}>
          <button className="btn btn-outline" onClick={onCancel}>Cancel</button>
          <button className="btn btn-primary" onClick={()=>{if(!form.firstName||!form.lastName){alert('Name required');return;}onSave(form);}}>Save Client</button>
        </div>
        <Modal show={petModal} title={editPet?'Edit Animal':'Add Animal'} onClose={()=>setPetModal(false)}
          footer={<><button className="btn btn-outline" onClick={()=>setPetModal(false)}>Cancel</button><button className="btn btn-primary" onClick={savePet}>Save Animal</button></>}>
          <div className="grid-2">
            <div className="form-group"><label className="form-label">Name *</label><input className="form-control" value={petForm.name} onChange={e=>setPetForm(f=>({...f,name:e.target.value}))}/></div>
            <div className="form-group"><label className="form-label">Animal Type</label>
              <select className="form-control" value={petForm.animalType} onChange={e=>setPetForm(f=>({...f,animalType:e.target.value}))}>
                {ANIMAL_TYPES.map(t=><option key={t}>{t}</option>)}
              </select>
            </div>
            <div className="form-group"><label className="form-label">Breed</label><input className="form-control" value={petForm.breed} onChange={e=>setPetForm(f=>({...f,breed:e.target.value}))}/></div>
            <div className="form-group"><label className="form-label">Age</label><input className="form-control" value={petForm.age} onChange={e=>setPetForm(f=>({...f,age:e.target.value}))}/></div>
          </div>
          <div className="form-group"><label className="form-label">Food Preferences</label><input className="form-control" value={petForm.foodPref} onChange={e=>setPetForm(f=>({...f,foodPref:e.target.value}))}/></div>
          <div className="form-group"><label className="form-label">Special Notes</label><textarea className="form-control" rows={2} value={petForm.specialNotes} onChange={e=>setPetForm(f=>({...f,specialNotes:e.target.value}))}/></div>
        </Modal>
      </div>
    );
  }

  function saveClient(form){
    if(editClient){
      setClients(prev=>prev.map(c=>c.id===editClient.id?{...c,...form}:c));
    } else {
      setClients(prev=>[...prev,{...form,id:uid()}]);
    }
    setShowModal(false);setEditClient(null);
  }

  if(selectedClient){
    const cl=clients.find(c=>c.id===selectedClient.id)||selectedClient;
    const clDists=distributions.filter(d=>d.clientId===cl.id).sort((a,b)=>b.date.localeCompare(a.date));
    return(
      <div className="page">
        <div className="section-header mb-4">
          <button className="btn btn-outline" onClick={()=>setSelectedClient(null)}>← Back to Clients</button>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-outline" onClick={()=>{setEditClient(cl);setShowModal(true)}}>Edit Client</button>
            <button className="btn btn-gold" onClick={()=>navigate('pickup',{clientId:cl.id})}>🛍 Record Pickup</button>
          </div>
        </div>
        <div className="grid-2 mb-4">
          <div className="card">
            <div className="card-header"><span className="card-title">👤 {cl.firstName} {cl.lastName}</span></div>
            {cl.phone&&<div className="text-sm mb-2">📞 {cl.phone}</div>}
            {cl.email&&<div className="text-sm mb-2">✉️ {cl.email}</div>}
            {cl.address&&<div className="text-sm mb-2">📍 {cl.address}</div>}
            {cl.notes&&<div className="alert alert-info mt-3 text-sm">{cl.notes}</div>}
          </div>
          <div className="card">
            <div className="card-header"><span className="card-title">🐾 Animals ({cl.pets?.length||0})</span></div>
            {(cl.pets||[]).length===0&&<div className="text-sm text-muted">No animals on file.</div>}
            {(cl.pets||[]).map(pet=>(
              <div key={pet.id} style={{padding:'10px 0',borderBottom:'1px solid var(--gray-100)'}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:20}}>{pet.animalType==='Cat'?'🐱':pet.animalType==='Dog'?'🐶':'🐾'}</span>
                  <div>
                    <div className="font-bold text-sm">{pet.name}</div>
                    <div className="text-xs text-muted">{pet.breed||'Unknown'} · Age: {pet.age||'?'}</div>
                  </div>
                </div>
                {pet.foodPref&&<div className="text-xs text-muted mt-1">🍽 {pet.foodPref}</div>}
                {pet.specialNotes&&<div className="text-xs text-muted">📝 {pet.specialNotes}</div>}
              </div>
            ))}
          </div>
        </div>
        <div className="card">
          <div className="card-header"><span className="card-title">📦 Pickup History ({clDists.length})</span></div>
          {clDists.length===0&&<div className="empty-state" style={{padding:24}}><div className="icon">🛍</div><h3>No pickups yet</h3></div>}
          {clDists.map(d=>{
            const totalUnits=d.items.reduce((s,i)=>s+i.qty,0);
            return(
              <div key={d.id} style={{borderBottom:'1px solid var(--gray-100)',padding:'12px 0'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                  <div>
                    <span className="font-bold text-sm">{fmtDate(d.date)}</span>
                    <span className="text-xs text-muted" style={{marginLeft:10}}>{d.items.length} product{d.items.length!==1?'s':''} · {totalUnits} unit{totalUnits!==1?'s':''}</span>
                    {d.notes&&<span className="text-xs text-muted" style={{marginLeft:10}}>· {d.notes}</span>}
                  </div>
                  <button className="btn btn-sm btn-outline" onClick={()=>openEditDist(d)}>✏️ Edit Pickup</button>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:4,paddingLeft:10,borderLeft:'3px solid var(--gray-200)'}}>
                  {d.items.map((item,idx)=>{
                    const p=products.find(p=>p.id===item.productId);
                    return(
                      <div key={idx} style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                        <div>
                          <span className="text-sm">{p?p.name:<span className="text-muted">Unknown product</span>}</span>
                          {p&&<span className="text-xs text-muted" style={{marginLeft:8}}>{p.brand}{p.size?` · ${p.size}`:''}</span>}
                        </div>
                        <div style={{display:'flex',alignItems:'center',gap:8}}>
                          {p&&animalBadge(p.animalType)}
                          <span className="badge badge-pending">×{item.qty}</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>

        {/* Edit Pickup Modal */}
        {editDist&&(
          <Modal show onClose={closeEditDist} title={`Edit Pickup — ${fmtDate(editDist.date)}`} wide
            footer={<>
              <button className="btn btn-outline" onClick={closeEditDist}>Cancel</button>
              <button className="btn btn-success" onClick={()=>setEditConfirm(true)} disabled={editDistItems.length===0}>✅ Save Changes</button>
            </>}>
            <div className="alert alert-info mb-3">
              You can add new items, adjust quantities, or remove items. Inventory will be updated automatically to reflect the difference.
            </div>
            <div className="grid-2 mb-3">
              <div className="form-group" style={{margin:0}}>
                <label className="form-label">Pickup Date</label>
                <input type="date" className="form-control" value={editDistDate} onChange={e=>setEditDistDate(e.target.value)}/>
              </div>
              <div className="form-group" style={{margin:0}}>
                <label className="form-label">Notes</label>
                <input className="form-control" value={editDistNotes} onChange={e=>setEditDistNotes(e.target.value)} placeholder="Optional notes"/>
              </div>
            </div>

            {/* UPC scan bar */}
            <div className="upc-bar mb-3" style={{padding:12}}>
              <span style={{color:'var(--gold)',fontWeight:700,fontSize:13}}>📡 Add by UPC</span>
              <input className="upc-input" style={{fontSize:14,padding:'8px 12px'}} placeholder="Scan or type UPC…"
                value={editUpcInput} onChange={e=>setEditUpcInput(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&editDistAddByUPC()}/>
              <button className="btn btn-gold btn-sm" onClick={editDistAddByUPC}>Add</button>
            </div>

            {/* Current items */}
            <div style={{marginBottom:12}}>
              {editDistItems.length===0&&<div className="text-sm text-muted">No items — add some above.</div>}
              {editDistItems.map((item,idx)=>{
                const p=products.find(p=>p.id===item.productId);
                const origItem=editDist.items.find(i=>i.productId===item.productId);
                const origQty=origItem?.qty||0;
                const avail=(inv[item.productId]||0)+(origQty); // available = current stock + what was originally taken
                return(
                  <div key={item.id} className="batch-line">
                    <div style={{flex:1}}>
                      <div className="font-bold text-sm">{p?.name||'Unknown'}</div>
                      <div className="text-xs text-muted">{p?.brand} {p?.size&&`· ${p.size}`}
                        {origQty>0&&<span style={{marginLeft:8,color:'var(--gray-400)'}}>Originally: {origQty}</span>}
                      </div>
                    </div>
                    <div className="qty-controls">
                      <button className="qty-btn" onClick={()=>setEditDistItems(prev=>prev.map((it,i)=>i===idx?{...it,qty:Math.max(1,it.qty-1)}:it))}>−</button>
                      <input className="qty-num form-control" type="number" min={1} value={item.qty}
                        onChange={e=>setEditDistItems(prev=>prev.map((it,i)=>i===idx?{...it,qty:parseInt(e.target.value)||1}:it))}/>
                      <button className="qty-btn" onClick={()=>setEditDistItems(prev=>prev.map((it,i)=>i===idx?{...it,qty:it.qty+1}:it))}>+</button>
                    </div>
                    <button className="btn btn-sm btn-danger" onClick={()=>setEditDistItems(prev=>prev.filter((_,i)=>i!==idx))}>✕</button>
                  </div>
                );
              })}
            </div>

            {/* Quick-add from available inventory */}
            <div>
              <div className="text-xs text-muted font-bold mb-2" style={{textTransform:'uppercase',letterSpacing:'.05em'}}>Quick Add from Inventory</div>
              <div style={{maxHeight:180,overflowY:'auto',border:'1px solid var(--gray-200)',borderRadius:'var(--radius)'}}>
                {products.filter(p=>{
                  const alreadyIn=editDistItems.find(i=>i.productId===p.id);
                  const origItem=editDist.items.find(i=>i.productId===p.id);
                  const effectiveStock=(inv[p.id]||0)+(origItem?.qty||0);
                  return effectiveStock>0||alreadyIn;
                }).map(p=>{
                  const origItem=editDist.items.find(i=>i.productId===p.id);
                  const effectiveStock=(inv[p.id]||0)+(origItem?.qty||0);
                  return(
                    <div key={p.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 12px',borderBottom:'1px solid var(--gray-100)',cursor:'pointer'}}
                      onClick={()=>editDistAddProduct(p)}>
                      <div>
                        <span className="text-sm font-bold">{p.name}</span>
                        <span className="text-xs text-muted" style={{marginLeft:8}}>{p.animalType} · {p.category}</span>
                      </div>
                      <div style={{display:'flex',gap:8,alignItems:'center'}}>
                        <span className="text-xs text-muted">{effectiveStock} avail.</span>
                        <button className="btn btn-sm btn-outline" onClick={e=>{e.stopPropagation();editDistAddProduct(p);}}>+ Add</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </Modal>
        )}

        <ConfirmModal show={editConfirm}
          message={`Save changes to this pickup? Inventory will be adjusted to reflect any differences from the original.`}
          onConfirm={saveEditDist} onCancel={()=>setEditConfirm(false)}/>

        <Modal show={showModal} onClose={()=>{setShowModal(false);setEditClient(null)}} title="Edit Client" wide>
          <ClientForm client={editClient} onSave={saveClient} onCancel={()=>{setShowModal(false);setEditClient(null)}}/>
        </Modal>
      </div>
    );
  }

  return(
    <div className="page">
      <div className="section-header mb-4">
        <div className="section-title">👥 Clients ({clients.length})</div>
        <button className="btn btn-primary" onClick={()=>{setEditClient(null);setShowModal(true)}}>+ Add Client</button>
      </div>
      <div className="search-bar mb-4">
        <input className="form-control" placeholder="Search by name, phone, or email…" value={search} onChange={e=>setSearch(e.target.value)}/>
      </div>
      <div className="grid-3">
        {filtered.length===0&&<div className="card" style={{gridColumn:'1/-1'}}><div className="empty-state"><div className="icon">👥</div><h3>No clients found</h3></div></div>}
        {filtered.map(c=>(
          <div key={c.id} className="client-card" onClick={()=>setSelectedClient(c)}>
            <div style={{display:'flex',gap:12,alignItems:'flex-start'}}>
              <div className="client-avatar">{c.firstName[0]}{c.lastName[0]}</div>
              <div style={{flex:1}}>
                <div className="font-bold">{c.firstName} {c.lastName}</div>
                {c.phone&&<div className="text-sm text-muted">📞 {c.phone}</div>}
                {c.email&&<div className="text-sm text-muted" style={{fontSize:12}}>✉️ {c.email}</div>}
                <div style={{marginTop:6,display:'flex',gap:6,flexWrap:'wrap'}}>
                  {(c.pets||[]).map(pet=>(
                    <span key={pet.id} className={`badge ${pet.animalType==='Cat'?'badge-cat':pet.animalType==='Dog'?'badge-dog':'badge-other'}`}>
                      {pet.animalType==='Cat'?'🐱':pet.animalType==='Dog'?'🐶':'🐾'} {pet.name}
                    </span>
                  ))}
                </div>
              </div>
            </div>
          </div>
        ))}
      </div>
      <Modal show={showModal} onClose={()=>{setShowModal(false);setEditClient(null)}} title={editClient?'Edit Client':'Add New Client'} wide>
        <ClientForm client={editClient} onSave={saveClient} onCancel={()=>{setShowModal(false);setEditClient(null)}}/>
      </Modal>
    </div>
  );
}

// ── RECORD PICKUP ─────────────────────────────────────────────────────────────
function RecordPickup({clients,products,inventory,setInventory,distributions,setDistributions,params,navigate}){
  const [search,setSearch]=useState('');
  const [selectedClient,setSelectedClient]=useState(null);
  const [upcInput,setUpcInput]=useState('');
  const [items,setItems]=useState([]);
  const [pickupDate,setPickupDate]=useState(today());
  const [notes,setNotes]=useState('');
  const [confirm,setConfirm]=useState(false);
  const upcRef=useRef(null);

  const inv=useMemo(()=>{const m={};inventory.forEach(i=>m[i.productId]=i.qty);return m;},[inventory]);
  const prodMap=useMemo(()=>{const m={};products.forEach(p=>m[p.id]=p);return m;},[products]);

  useEffect(()=>{
    if(params?.clientId){
      const cl=clients.find(c=>c.id===params.clientId);
      if(cl) setSelectedClient(cl);
    }
  },[params]);

  const clientsFiltered=clients.filter(c=>{
    const q=search.toLowerCase();
    return !q||(c.firstName+' '+c.lastName+c.phone+c.email).toLowerCase().includes(q);
  });

  function addByUPC(){
    const code=upcInput.trim();
    if(!code) return;
    const prod=products.find(p=>p.upc===code);
    if(!prod){alert('Product not found in master. Please add it first.');return;}
    const existing=items.findIndex(i=>i.productId===prod.id);
    if(existing>=0){
      setItems(prev=>prev.map((it,i)=>i===existing?{...it,qty:it.qty+1}:it));
    } else {
      setItems(prev=>[...prev,{id:uid(),productId:prod.id,qty:1,notes:''}]);
    }
    setUpcInput('');upcRef.current?.focus();
  }

  function addByProduct(p){
    const existing=items.findIndex(i=>i.productId===p.id);
    if(existing>=0){setItems(prev=>prev.map((it,i)=>i===existing?{...it,qty:it.qty+1}:it));}
    else{setItems(prev=>[...prev,{id:uid(),productId:p.id,qty:1,notes:''}]);}
  }

  function finalizePickup(){
    if(!selectedClient){alert('Select a client first.');return;}
    if(items.length===0){alert('No items selected.');return;}
    // Check stock
    for(const item of items){
      if((inv[item.productId]||0)<item.qty){
        const p=prodMap[item.productId];
        alert(`Insufficient stock for ${p?.name}. Only ${inv[item.productId]||0} available.`);
        return;
      }
    }
    const dist={id:uid(),clientId:selectedClient.id,date:pickupDate,notes,items:items.map(i=>({productId:i.productId,qty:i.qty,notes:i.notes}))};
    const updates={};
    items.forEach(i=>{updates[i.productId]=(updates[i.productId]||0)+i.qty;});
    setInventory(prev=>prev.map(i=>updates[i.productId]!==undefined?{...i,qty:i.qty-updates[i.productId]}:i));
    setDistributions(prev=>[dist,...prev]);
    setItems([]);setNotes('');setConfirm(false);
    alert(`Pickup recorded for ${selectedClient.firstName} ${selectedClient.lastName}! ✅`);
    navigate('clients',{clientId:selectedClient.id});
  }

  if(!selectedClient){
    return(
      <div className="page">
        <div className="section-header mb-4"><div className="section-title">🛍 Record Pickup — Select Client</div></div>
        <div className="search-bar mb-4">
          <input className="form-control lg" placeholder="Search client by name, phone, or email…" value={search} onChange={e=>setSearch(e.target.value)} autoFocus/>
        </div>
        <div className="grid-3">
          {clientsFiltered.length===0&&<div className="card" style={{gridColumn:'1/-1'}}><div className="empty-state"><div className="icon">👥</div><h3>No clients found</h3></div></div>}
          {clientsFiltered.map(c=>(
            <div key={c.id} className="client-card" onClick={()=>setSelectedClient(c)}>
              <div style={{display:'flex',gap:12,alignItems:'center'}}>
                <div className="client-avatar">{c.firstName[0]}{c.lastName[0]}</div>
                <div>
                  <div className="font-bold">{c.firstName} {c.lastName}</div>
                  {c.phone&&<div className="text-sm text-muted">{c.phone}</div>}
                  <div className="text-xs text-muted">{(c.pets||[]).length} animal{(c.pets||[]).length!==1?'s':''}</div>
                </div>
              </div>
            </div>
          ))}
        </div>
        <div className="mt-4">
          <button className="btn btn-outline" onClick={()=>navigate('clients')}>+ Add New Client First</button>
        </div>
      </div>
    );
  }

  return(
    <div className="page">
      <div className="section-header mb-4">
        <div>
          <div className="section-title">🛍 Record Pickup</div>
          <div className="text-sm text-muted">{selectedClient.firstName} {selectedClient.lastName}</div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-outline" onClick={()=>{setSelectedClient(null);setItems([])}}>← Change Client</button>
          <button className="btn btn-success btn-lg" onClick={()=>setConfirm(true)} disabled={items.length===0}>✅ Complete Pickup</button>
        </div>
      </div>

      <div className="grid-2 mb-4">
        <div className="card">
          <div className="card-header"><span className="card-title">👤 {selectedClient.firstName} {selectedClient.lastName}</span></div>
          {selectedClient.phone&&<div className="text-sm mb-1">📞 {selectedClient.phone}</div>}
          {(selectedClient.pets||[]).map(pet=>(
            <div key={pet.id} className="text-sm mb-1">{pet.animalType==='Cat'?'🐱':pet.animalType==='Dog'?'🐶':'🐾'} <strong>{pet.name}</strong> — {pet.breed||pet.animalType}
              {pet.foodPref&&<span className="text-muted"> · Prefers: {pet.foodPref}</span>}
            </div>
          ))}
        </div>
        <div>
          <div className="form-group"><label className="form-label">Pickup Date</label>
            <input type="date" className="form-control" value={pickupDate} onChange={e=>setPickupDate(e.target.value)}/></div>
          <div className="form-group"><label className="form-label">Notes</label>
            <textarea className="form-control" value={notes} onChange={e=>setNotes(e.target.value)} rows={2}/></div>
        </div>
      </div>

      <div className="upc-bar mb-4">
        <span style={{color:'var(--gold)',fontWeight:700,fontSize:15}}>📡 Scan Item</span>
        <input ref={upcRef} className="upc-input" placeholder="Scan UPC to add item…" value={upcInput}
          onChange={e=>setUpcInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addByUPC()} autoFocus/>
        <button className="btn btn-gold" onClick={addByUPC}>Add</button>
      </div>

      <div className="grid-2">
        <div className="card">
          <div className="card-header"><span className="card-title">Pickup Items ({items.length})</span></div>
          {items.length===0&&<div className="text-sm text-muted">No items added yet. Scan or click from inventory.</div>}
          {items.map(item=>{
            const p=prodMap[item.productId];
            const avail=inv[item.productId]||0;
            return(
              <div key={item.id} className="batch-line">
                <div style={{flex:1}}>
                  <div className="font-bold text-sm">{p?.name}</div>
                  <div className="text-xs text-muted">{p?.brand} · Available: {avail}</div>
                </div>
                <div className="qty-controls">
                  <button className="qty-btn" onClick={()=>setItems(prev=>prev.map(i=>i.id===item.id?{...i,qty:Math.max(1,i.qty-1)}:i))}>−</button>
                  <input className="qty-num form-control" type="number" min={1} max={avail} value={item.qty}
                    onChange={e=>setItems(prev=>prev.map(i=>i.id===item.id?{...i,qty:Math.min(avail,parseInt(e.target.value)||1)}:i))}/>
                  <button className="qty-btn" onClick={()=>setItems(prev=>prev.map(i=>i.id===item.id?{...i,qty:Math.min(avail,i.qty+1)}:i))}>+</button>
                </div>
                <button className="btn btn-sm btn-danger" onClick={()=>setItems(prev=>prev.filter(i=>i.id!==item.id))}>✕</button>
              </div>
            );
          })}
        </div>
        <div className="card">
          <div className="card-header"><span className="card-title">Available Inventory</span></div>
          <input className="form-control mb-3" placeholder="Filter products…"
            value={search} onChange={e=>setSearch(e.target.value)}/>
          <div style={{maxHeight:320,overflowY:'auto'}}>
            {products.filter(p=>{
              const q=search.toLowerCase();
              return (!q||(p.name+p.brand).toLowerCase().includes(q))&&(inv[p.id]||0)>0;
            }).map(p=>(
              <div key={p.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:'1px solid var(--gray-100)',cursor:'pointer'}}
                onClick={()=>addByProduct(p)}>
                <div>
                  <div className="text-sm font-bold">{p.name}</div>
                  <div className="text-xs text-muted">{p.animalType} · {p.category}</div>
                </div>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  <span className="text-sm text-muted">{inv[p.id]} avail.</span>
                  <button className="btn btn-sm btn-outline">+ Add</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      <ConfirmModal show={confirm}
        message={`Complete pickup for ${selectedClient.firstName} ${selectedClient.lastName}? ${items.length} item types, ${items.reduce((s,i)=>s+i.qty,0)} total units. Inventory will be updated immediately.`}
        onConfirm={finalizePickup} onCancel={()=>setConfirm(false)}/>
    </div>
  );
}

// ── REPORTS ───────────────────────────────────────────────────────────────────
function Reports({products,inventory,batches,distributions,clients}){
  const [report,setReport]=useState('inventory');
  const [dateFrom,setDateFrom]=useState('');
  const [dateTo,setDateTo]=useState('');
  const [filterType,setFilterType]=useState('All');

  const inv=useMemo(()=>{const m={};inventory.forEach(i=>m[i.productId]=i.qty);return m;},[inventory]);
  const prodMap=useMemo(()=>{const m={};products.forEach(p=>m[p.id]=p);return m;},[products]);
  const clientMap=useMemo(()=>{const m={};clients.forEach(c=>m[c.id]=c);return m;},[clients]);

  function inRange(dateStr){
    if(dateFrom&&dateStr<dateFrom) return false;
    if(dateTo&&dateStr>dateTo) return false;
    return true;
  }

  const REPORTS=[
    {id:'inventory',label:'📦 Inventory by Category'},
    {id:'donations',label:'📥 Donations Received'},
    {id:'distributions',label:'🛍 Distribution History'},
    {id:'low',label:'⚠️ Low Stock'},
    {id:'out',label:'🚫 Out of Stock'},
    {id:'cat',label:'🐱 Cat Supplies'},
    {id:'dog',label:'🐶 Dog Supplies'},
    {id:'other',label:'🐾 Other Animals'},
  ];

  function renderReport(){
    switch(report){
      case 'inventory':{
        const rows=products.filter(p=>filterType==='All'||p.animalType===filterType);
        return(
          <table><thead><tr><th>Product</th><th>Brand</th><th>Animal</th><th>Category</th><th>UPC</th><th>Qty</th><th>Status</th></tr></thead>
          <tbody>{rows.map(p=><tr key={p.id}><td>{p.name}</td><td>{p.brand}</td><td>{p.animalType}</td><td>{p.category}</td><td>{p.upc||'—'}</td><td className="font-bold">{inv[p.id]||0}</td><td>{stockBadge(inv[p.id]||0)}</td></tr>)}</tbody></table>
        );
      }
      case 'donations':{
        const rows=batches.filter(b=>b.status==='finalized'&&inRange(b.date));
        return(
          <table><thead><tr><th>Date</th><th>Donor</th><th>Products</th><th>Units</th><th>Notes</th></tr></thead>
          <tbody>{rows.map(b=><tr key={b.id}><td>{fmtDate(b.date)}</td><td>{b.donor||'Anonymous'}</td><td>{b.items.length}</td><td>{b.items.reduce((s,i)=>s+i.qty,0)}</td><td>{b.notes||'—'}</td></tr>)}</tbody></table>
        );
      }
      case 'distributions':{
        const rows=distributions.filter(d=>inRange(d.date));
        return(
          <table><thead><tr><th>Date</th><th>Client</th><th>Items</th><th>Units</th><th>Notes</th></tr></thead>
          <tbody>{rows.map(d=>{const cl=clientMap[d.clientId];return<tr key={d.id}><td>{fmtDate(d.date)}</td><td>{cl?`${cl.firstName} ${cl.lastName}`:'Unknown'}</td><td>{d.items.length}</td><td>{d.items.reduce((s,i)=>s+i.qty,0)}</td><td>{d.notes||'—'}</td></tr>})}</tbody></table>
        );
      }
      case 'low':{
        const rows=products.filter(p=>{const q=inv[p.id]||0;return q>0&&q<=LOW_STOCK_THRESHOLD;});
        return(
          <table><thead><tr><th>Product</th><th>Animal</th><th>Category</th><th>Qty</th></tr></thead>
          <tbody>{rows.map(p=><tr key={p.id}><td>{p.name}</td><td>{animalBadge(p.animalType)}</td><td>{p.category}</td><td><span className="badge badge-low">{inv[p.id]}</span></td></tr>)}</tbody></table>
        );
      }
      case 'out':{
        const rows=products.filter(p=>(inv[p.id]||0)===0);
        return(
          <table><thead><tr><th>Product</th><th>Animal</th><th>Category</th><th>UPC</th></tr></thead>
          <tbody>{rows.map(p=><tr key={p.id}><td>{p.name}</td><td>{animalBadge(p.animalType)}</td><td>{p.category}</td><td>{p.upc||'—'}</td></tr>)}</tbody></table>
        );
      }
      case 'cat':case 'dog':case 'other':{
        const type=report==='cat'?'Cat':report==='dog'?'Dog':'Other';
        const rows=products.filter(p=>p.animalType===type);
        return(
          <table><thead><tr><th>Product</th><th>Brand</th><th>Category</th><th>Size</th><th>On Hand</th><th>Status</th></tr></thead>
          <tbody>{rows.map(p=><tr key={p.id}><td>{p.name}</td><td>{p.brand||'—'}</td><td>{p.category}</td><td>{p.size||'—'}</td><td className="font-bold">{inv[p.id]||0}</td><td>{stockBadge(inv[p.id]||0)}</td></tr>)}</tbody></table>
        );
      }
      default: return null;
    }
  }

  function exportReport(){
    const rpt=renderReportData();
    if(rpt) exportCSV(rpt.rows,rpt.cols,'DELC_PetPantry_'+report+'_'+today());
  }

  function renderReportData(){
    switch(report){
      case 'inventory': return {
        cols:[{key:'name',label:'Product'},{key:'brand',label:'Brand'},{key:'animalType',label:'Animal'},{key:'category',label:'Category'},{key:'upc',label:'UPC'},{key:'qty',label:'Qty'},{key:'status',label:'Status'}],
        rows:products.filter(p=>filterType==='All'||p.animalType===filterType).map(p=>({name:p.name,brand:p.brand||'',animalType:p.animalType,category:p.category,upc:p.upc||'',qty:inv[p.id]||0,status:(inv[p.id]||0)===0?'Out of Stock':(inv[p.id]||0)<=LOW_STOCK_THRESHOLD?'Low Stock':'In Stock'}))
      };
      case 'donations': return {
        cols:[{key:'date',label:'Date'},{key:'donor',label:'Donor'},{key:'products',label:'Products'},{key:'units',label:'Units'},{key:'notes',label:'Notes'}],
        rows:batches.filter(b=>b.status==='finalized'&&inRange(b.date)).map(b=>({date:b.date,donor:b.donor||'Anonymous',products:b.items.length,units:b.items.reduce((s,i)=>s+i.qty,0),notes:b.notes||''}))
      };
      default: return null;
    }
  }

  return(
    <div className="page">
      <div className="section-header mb-4">
        <div className="section-title">📊 Reports</div>
        <button className="btn btn-outline" onClick={exportReport}>📥 Export CSV</button>
      </div>
      <div className="tabs mb-4">
        {REPORTS.map(r=><button key={r.id} className={`tab ${report===r.id?'active':''}`} onClick={()=>setReport(r.id)}>{r.label}</button>)}
      </div>
      <div className="report-filter-bar">
        <div className="form-group" style={{margin:0,flex:1}}>
          <label className="form-label">From Date</label>
          <input type="date" className="form-control" value={dateFrom} onChange={e=>setDateFrom(e.target.value)}/>
        </div>
        <div className="form-group" style={{margin:0,flex:1}}>
          <label className="form-label">To Date</label>
          <input type="date" className="form-control" value={dateTo} onChange={e=>setDateTo(e.target.value)}/>
        </div>
        <div className="form-group" style={{margin:0,flex:1}}>
          <label className="form-label">Animal Type</label>
          <select className="form-control" value={filterType} onChange={e=>setFilterType(e.target.value)}>
            <option>All</option>{ANIMAL_TYPES.map(t=><option key={t}>{t}</option>)}
          </select>
        </div>
        <button className="btn btn-outline" onClick={()=>{setDateFrom('');setDateTo('');setFilterType('All');}}>Clear</button>
      </div>
      <div className="table-wrap">{renderReport()}</div>
    </div>
  );
}

// ── SETTINGS ──────────────────────────────────────────────────────────────────
function Settings({setProducts,setInventory,setBatches,setDistributions,setClients}){
  const [confirm,setConfirm]=useState(null);

  function resetToSample(){
    setProducts(SAMPLE_PRODUCTS);
    setInventory(SAMPLE_INVENTORY);
    setBatches(SAMPLE_BATCHES);
    setDistributions(SAMPLE_DISTRIBUTIONS);
    setClients(SAMPLE_CLIENTS);
    alert('Data reset to sample data.');
    setConfirm(null);
  }

  function clearAll(){
    setProducts([]);setInventory([]);setBatches([]);setDistributions([]);setClients([]);
    alert('All data cleared.');setConfirm(null);
  }

  return(
    <div className="page">
      <div className="section-header mb-4"><div className="section-title">⚙️ Settings</div></div>
      <div className="card mb-4">
        <div className="card-header"><span className="card-title">About</span></div>
        <div className="text-sm mb-2"><strong>DELC Pet Pantry Management System</strong></div>
        <div className="text-sm text-muted mb-1">Duncansville Evangelical Lutheran Church</div>
        <div className="text-sm text-muted mb-1">Version 1.0 — Built for church volunteers</div>
        <div className="text-sm text-muted">Data is stored locally in your browser (localStorage).</div>
      </div>
      <div className="card mb-4">
        <div className="card-header"><span className="card-title">Thresholds</span></div>
        <div className="text-sm text-muted">Low stock alert triggers when quantity is ≤ {LOW_STOCK_THRESHOLD} units.</div>
      </div>
      <div className="card">
        <div className="card-header"><span className="card-title">Data Management</span></div>
        <div style={{display:'flex',gap:10,marginTop:8}}>
          <button className="btn btn-outline" onClick={()=>setConfirm('sample')}>Reset to Sample Data</button>
          <button className="btn btn-danger" onClick={()=>setConfirm('clear')}>Clear All Data</button>
        </div>
      </div>
      <ConfirmModal show={confirm==='sample'} message="Reset all data to sample data? All current data will be lost."
        onConfirm={resetToSample} onCancel={()=>setConfirm(null)}/>
      <ConfirmModal show={confirm==='clear'} message="Clear ALL data permanently? This cannot be undone."
        onConfirm={clearAll} onCancel={()=>setConfirm(null)}/>
    </div>
  );
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
const PASSWORD='Delc.1200';

function LoginPage({onLogin}){
  const [username,setUsername]=useState('');
  const [password,setPassword]=useState('');
  const [error,setError]=useState('');
  const [showPw,setShowPw]=useState(false);

  function handleLogin(e){
    e.preventDefault();
    const u=username.trim().toLowerCase();
    if(!u){setError('Please enter your username.');return;}
    if(password!==PASSWORD){setError('Incorrect password. Please try again.');return;}
    // Username format: firstinitial + lastname, no spaces
    if(!/^[a-z][a-z]+$/.test(u)){setError('Username format: first initial + last name (e.g. ddetrich).');return;}
    onLogin(u);
  }

  return(
    <div className="login-page">
      <div className="login-card">
        <div className="login-logo">
          <div className="paw">🐾</div>
          <h1>DELC Pet Pantry</h1>
          <p>Duncansville Evangelical Lutheran Church</p>
        </div>
        {error&&<div className="login-error">⚠️ {error}</div>}
        <form onSubmit={handleLogin}>
          <div className="form-group">
            <label className="form-label">Username</label>
            <input className="form-control lg" value={username} onChange={e=>setUsername(e.target.value)}
              placeholder="e.g. ddetrich" autoComplete="username" autoFocus/>
          </div>
          <div className="form-group" style={{position:'relative'}}>
            <label className="form-label">Password</label>
            <input className="form-control lg" type={showPw?'text':'password'} value={password}
              onChange={e=>setPassword(e.target.value)} placeholder="Enter password" autoComplete="current-password"/>
            <button type="button" onClick={()=>setShowPw(s=>!s)}
              style={{position:'absolute',right:12,top:34,background:'none',border:'none',cursor:'pointer',color:'var(--gray-400)',fontSize:18}}>
              {showPw?'🙈':'👁'}
            </button>
          </div>
          <button type="submit" className="btn btn-primary btn-lg w-full" style={{marginTop:8}}>Sign In →</button>
        </form>
        <div className="login-hint">
          <strong>Username format:</strong> first initial + last name, no spaces<br/>
          <strong>Example:</strong> Derek Detrich → <code>ddetrich</code><br/>
          <strong>Example:</strong> Jane Smith → <code>jsmith</code>
        </div>
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const [currentUser,setCurrentUser]=useState(()=>LS.get('currentUser',null));
  const [page,setPage]=useState('dashboard');
  const [pageParams,setPageParams]=useState(null);
  const [products,setProducts]=useState(()=>LS.get('products',SAMPLE_PRODUCTS));
  const [inventory,setInventory]=useState(()=>LS.get('inventory',SAMPLE_INVENTORY));
  const [batches,setBatches]=useState(()=>LS.get('batches',SAMPLE_BATCHES));
  const [distributions,setDistributions]=useState(()=>LS.get('distributions',SAMPLE_DISTRIBUTIONS));
  const [clients,setClients]=useState(()=>LS.get('clients',SAMPLE_CLIENTS));

  useEffect(()=>LS.set('currentUser',currentUser),[currentUser]);
  useEffect(()=>LS.set('products',products),[products]);
  useEffect(()=>LS.set('inventory',inventory),[inventory]);
  useEffect(()=>LS.set('batches',batches),[batches]);
  useEffect(()=>LS.set('distributions',distributions),[distributions]);
  useEffect(()=>LS.set('clients',clients),[clients]);

  const pendingCount=batches.filter(b=>b.status==='pending').length;
  const inv=useMemo(()=>{const m={};inventory.forEach(i=>m[i.productId]=i.qty);return m;},[inventory]);
  const outCount=products.filter(p=>(inv[p.id]||0)===0).length;

  function handleLogin(username){setCurrentUser(username);}
  function handleLogout(){setCurrentUser(null);setPage('dashboard');}
  function navigate(pg,params){setPage(pg);setPageParams(params||null);}

  if(!currentUser) return <LoginPage onLogin={handleLogin}/>;

  const NAV=[
    {id:'dashboard',icon:'🏠',label:'Dashboard'},
    {section:'Donations'},
    {id:'receive',icon:'📥',label:'Receive Donations'},
    {id:'batch-review',icon:'📋',label:'Batch Review',badge:pendingCount},
    {section:'Inventory'},
    {id:'inventory',icon:'📦',label:'Inventory',badge:outCount?`${outCount} out`:null},
    {id:'products',icon:'🏷',label:'Product Master'},
    {id:'adjustments',icon:'📊',label:'Adjustments'},
    {section:'Clients'},
    {id:'clients',icon:'👥',label:'Clients'},
    {id:'pickup',icon:'🛍',label:'Record Pickup'},
    {section:'System'},
    {id:'reports',icon:'📈',label:'Reports'},
    {id:'settings',icon:'⚙️',label:'Settings'},
  ];

  const PAGE_TITLES={dashboard:'Dashboard',receive:'Receive Donations','batch-review':'Batch Review',inventory:'Inventory',products:'Product Master',adjustments:'Adjustments Log',clients:'Clients',pickup:'Record Pickup',reports:'Reports',settings:'Settings'};

  function renderPage(){
    const props={products,setProducts,inventory,setInventory,batches,setBatches,distributions,setDistributions,clients,setClients,navigate,params:pageParams};
    switch(page){
      case 'dashboard': return <Dashboard {...props}/>;
      case 'receive': return <ReceiveDonations {...props}/>;
      case 'batch-review': return <BatchReview {...props}/>;
      case 'inventory': return <Inventory {...props}/>;
      case 'products': return <ProductMaster {...props}/>;
      case 'adjustments': return <AdjustmentsLog products={products}/>;
      case 'clients': return <Clients {...props}/>;
      case 'pickup': return <RecordPickup {...props}/>;
      case 'reports': return <Reports products={products} inventory={inventory} batches={batches} distributions={distributions} clients={clients}/>;
      case 'settings': return <Settings {...props}/>;
      default: return <Dashboard {...props}/>;
    }
  }

  return(
    <>
      <nav className="sidebar">
        <div className="sidebar-logo">
          <div style={{fontSize:36}}>🐾</div>
          <div className="sidebar-logo-text">DELC Pet Pantry</div>
          <div className="sidebar-logo-sub">Duncansville ELC</div>
        </div>
        {NAV.map((item,i)=>{
          if(item.section) return <div key={i} className="sidebar-section"><div className="sidebar-section-label">{item.section}</div></div>;
          return(
            <button key={item.id} className={`nav-item ${page===item.id?'active':''}`} onClick={()=>navigate(item.id)}>
              <span className="icon">{item.icon}</span>
              <span>{item.label}</span>
              {item.badge?<span style={{marginLeft:'auto',background:'var(--red)',color:'white',borderRadius:10,fontSize:10,padding:'2px 6px',fontWeight:700}}>{item.badge}</span>:null}
            </button>
          );
        })}
      </nav>
      <div className="main">
        <div className="topbar">
          <span className="topbar-title">{PAGE_TITLES[page]||page}</span>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            {outCount>0&&<span className="badge badge-out">🚫 {outCount} Out of Stock</span>}
            {pendingCount>0&&<span className="badge badge-pending">⏳ {pendingCount} Pending</span>}
            <div style={{display:'flex',alignItems:'center',gap:8,marginLeft:8,paddingLeft:12,borderLeft:'1px solid var(--gray-200)'}}>
              <span style={{fontSize:13,color:'var(--gray-600)'}}>👤 <strong>{currentUser}</strong></span>
              <button className="btn btn-sm btn-outline" onClick={handleLogout}>Sign Out</button>
            </div>
          </div>
        </div>
        {renderPage()}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
